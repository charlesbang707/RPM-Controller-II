<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J1939 Truck Control</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 15px; touch-action: manipulation; }
        .card { max-width: 420px; margin: auto; background: #2d2d2d; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        .status-bar { font-size: 14px; padding: 10px; border-radius: 10px; margin-bottom: 15px; background: #3d3d3d; color: #ffbc00; border: 1px solid transparent; }
        .connected { color: #00ff88 !important; border-color: #00ff88; }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; padding: 10px; background: #383838; border-radius: 12px; }
        select { width: 100%; padding: 12px; border-radius: 8px; background: #444; color: white; border: 1px solid #555; font-size: 15px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 18px; font-size: 16px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; -webkit-user-select: none; }
        .btn-conn { grid-column: span 2; background: #007bff; color: white; margin-bottom: 10px; }
        
        /* 커스텀 팝업 */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; }
        #popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 320px; background: #333; padding: 25px; border-radius: 20px; z-index: 101; border: 1px solid #555; }
        .popup-btns { display: flex; gap: 12px; margin-top: 25px; }
        .popup-btns button { flex: 1; padding: 14px; border-radius: 10px; font-size: 16px; }
    </style>
</head>
<body>

<div id="overlay"></div>
<div id="popup">
    <p id="popup-msg" style="margin:0; font-size:17px; line-height:1.6;">변경하시겠습니까?<br><small style="color:#aaa;">기기가 리셋되고 연결이 끊어집니다.</small></p>
    <div class="popup-btns">
        <button style="background:#28a745; color:white;" onclick="confirmChange()">예</button>
        <button style="background:#555; color:white;" onclick="hidePopup()">아니오</button>
    </div>
</div>

<div class="card">
    <h3 style="margin:0 0 15px 0;">J1939 RPM CONTROL</h3>
    <div id="status" class="status-bar">Bluetooth Disconnected</div>
    
    <div class="settings-grid">
        <div><label style="font-size:11px; color:#aaa; display:block; margin-bottom:5px;">SA</label>
            <select id="sa" onchange="ask('SA', 0xA2, this.value)"><option value="11">0x0B</option><option value="0">0x00</option></select>
        </div>
        <div><label style="font-size:11px; color:#aaa; display:block; margin-bottom:5px;">BAUD</label>
            <select id="bd" onchange="ask('Baudrate', 0xA1, this.value)"><option value="500">500k</option><option value="250">250k</option></select>
        </div>
    </div>

    <canvas id="gauge"></canvas>

    <div class="controls">
        <button id="connBtn" class="btn-conn" onclick="initBLE()">CONNECT SYSTEM</button>
        <button style="background:#28a745; color:white;" onclick="send(0xA3, 1)">START</button>
        <button style="background:#dc3545; color:white;" onclick="send(0xA3, 0)">STOP</button>
    </div>
</div>

<script>
    const S_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e", C_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
    let dev, char, pnd = null;

    const gauge = new RadialGauge({
        renderTo: 'gauge', width: 280, height: 280, units: "RPM", minValue: 0, maxValue: 3000,
        colorPlate: "#2d2d2d", colorMajorTicks: "#eee", colorNumbers: "#eee", animationDuration: 150
    }).draw();

    async function initBLE() {
        try {
            document.getElementById('status').innerText = "Scanning...";
            dev = await navigator.bluetooth.requestDevice({ filters: [{ services: [S_UUID] }] });
            dev.addEventListener('gattserverdisconnected', () => {
                document.getElementById('status').innerText = "Disconnected";
                document.getElementById('status').classList.remove('connected');
                document.getElementById('connBtn').style.display = 'block';
                gauge.value = 0;
            });
            const server = await dev.gatt.connect();
            const service = await server.getPrimaryService(S_UUID);
            char = await service.getCharacteristic(C_UUID);
            await char.startNotifications();
            char.oncharacteristicvaluechanged = (e) => {
                const v = e.target.value;
                gauge.value = v.getUint8(0) | (v.getUint8(1) << 8);
            };
            document.getElementById('status').innerText = "System Connected";
            document.getElementById('status').classList.add('connected');
            document.getElementById('connBtn').style.display = 'none';
        } catch (err) { document.getElementById('status').innerText = "Failed"; }
    }

    function ask(l, t, v) { if(!char) return; pnd = {t, v}; document.getElementById('popup').style.display='block'; document.getElementById('overlay').style.display='block'; }
    function hidePopup() { document.getElementById('popup').style.display='none'; document.getElementById('overlay').style.display='none'; }
    
    async function confirmChange() {
        if(pnd && char) {
            await char.writeValue(new Uint8Array([pnd.t, parseInt(pnd.val)]));
            if(dev && dev.gatt.connected) await dev.gatt.disconnect();
            hidePopup();
        }
    }
    async function send(t, v) { if(char) await char.writeValue(new Uint8Array([t, v])); }
</script>
</body>
</html>
