<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Truck RPM Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; min-height: 95vh; }
        .top-bar { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; }
        .btn-connect { background: linear-gradient(#555, #333); color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: 1px solid #222; box-shadow: 0 4px 0 #111; cursor: pointer; }
        .btn-connect.connected { background: linear-gradient(#e74c3c, #c0392b); box-shadow: 0 4px 0 #922b21; }
        #rpmVal { font-size: 50px; font-weight: 900; margin-top: -20px; }
        .baud-container { display: flex; gap: 10px; margin: 10px 0; }
        .btn-baud { background: #222; color: #aaa; padding: 8px 15px; border-radius: 6px; border: 1px solid #111; cursor: pointer; }
        .btn-baud.active { color: #3498db; border-color: #3498db; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 380px; }
        .btn { padding: 20px; border-radius: 12px; font-size: 18px; font-weight: bold; color: white; border: none; cursor: pointer; box-shadow: 0 6px 0 rgba(0,0,0,0.6); }
        .resume { background: linear-gradient(#2ecc71, #27ae60); }
        .up { background: linear-gradient(#3498db, #2980b9); }
        .stop { background: linear-gradient(#e74c3c, #c0392b); }
        .down { background: linear-gradient(#f39c12, #d68910); }
    </style>
</head>
<body>
    <div class="top-bar">
        <div id="status">Ready</div>
        <button id="connectBtn" class="btn-connect" onclick="toggleConnection()">CONNECT</button>
    </div>

    <div style="position:relative;">
        <canvas id="gauge-rpm"></canvas>
    </div>
    
    <div id="rpmVal">0</div>

    <div class="baud-container">
        <button id="btn250" class="btn-baud active" onclick="sendCmd(0x2500)">250 kbps</button>
        <button id="btn500" class="btn-baud" onclick="sendCmd(0x5000)">500 kbps</button>
    </div>

    <div class="grid-container">
        <button class="btn resume" onclick="sendCmd(1000)">RESUME</button>
        <button class="btn up" onclick="sendCmd(1)">UP</button>
        <button class="btn stop" onclick="sendCmd(600)">STOP</button>
        <button class="btn down" onclick="sendCmd(2)">DOWN</button>
    </div>

    <script>
        let device, characteristic;
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        var gauge = new RadialGauge({
            renderTo: 'gauge-rpm', width: 280, height: 280, units: "", minValue: 0, maxValue: 3000,
            majorTicks: ["0","500","1000","1500","2000","2500","3000"],
            colorPlate: "#1a1a1a", colorNumbers: "#fff", needleType: "arrow",
            highlights: [], highlightsWidth: 12, // 테두리 아크 두께
            borderShadowWidth: 0, borders: true, valueBox: false, animationDuration: 150
        }).draw();

        async function toggleConnection() {
            if (device && device.gatt.connected) { device.gatt.disconnect(); return; }
            try {
                // 검색 필터 최적화
                device = await navigator.bluetooth.requestDevice({ 
                    filters: [{ name: "Truck_RPM_Control" }],
                    optionalServices: [SERVICE_UUID] 
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHAR_UUID);
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (e) => {
                    let v = e.target.value;
                    let cur = v.getUint16(0, true);
                    let tar = v.getUint16(2, true);
                    
                    gauge.value = cur;
                    document.getElementById('rpmVal').innerText = cur;

                    // 테두리에 Target RPM 아크 실시간 표시
                    if (tar > 0) {
                        let col = tar > 1800 ? "rgba(231, 76, 60, 0.7)" : "rgba(46, 204, 113, 0.5)";
                        gauge.update({ highlights: [{ from: 0, to: tar, color: col }] });
                    } else {
                        gauge.update({ highlights: [] });
                    }
                });
                document.getElementById('status').innerText = "Connected";
                document.getElementById('connectBtn').innerText = "DISCONNECT";
                document.getElementById('connectBtn').classList.add('connected');
            } catch (err) { console.error(err); }
        }

        async function sendCmd(val) {
            if (characteristic) {
                await characteristic.writeValue(new Uint16Array([val]));
                if(val === 0x2500 || val === 0x5000) {
                    document.getElementById('btn250').classList.toggle('active', val === 0x2500);
                    document.getElementById('btn500').classList.toggle('active', val === 0x5000);
                }
            }
        }
    </script>
</body>
</html>
