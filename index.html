<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Truck RPM Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 380px; margin: auto; }
        .btn { padding: 20px; border-radius: 12px; font-size: 18px; font-weight: bold; color: white; border: none; cursor: pointer; box-shadow: 0 6px 0 rgba(0,0,0,0.6); }
        .resume { background: #2ecc71; } .up { background: #3498db; } .stop { background: #e74c3c; } .down { background: #f39c12; }
    </style>
</head>
<body>
    <button id="conn" style="padding:10px 20px; border-radius:8px;" onclick="conn()">CONNECT</button>
    <div id="status" style="margin:10px; color:#888;">Ready</div>
    <canvas id="gauge-rpm"></canvas>
    <h1 id="rpmVal">0</h1>
    <div class="grid">
        <button class="btn resume" onclick="send(1000)">RESUME</button>
        <button class="btn up" onclick="send(1)">UP</button>
        <button class="btn stop" onclick="send(600)">STOP</button>
        <button class="btn down" onclick="send(2)">DOWN</button>
    </div>

    <script>
        let device, characteristic;
        const S_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const C_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        const gauge = new RadialGauge({
            renderTo: 'gauge-rpm', width: 280, height: 280, minValue: 0, maxValue: 3000,
            majorTicks: ["0","500","1000","1500","2000","2500","3000"],
            colorPlate: "#1a1a1a", colorNumbers: "#fff", needleType: "arrow",
            highlights: [], highlightsWidth: 15, // 테두리 아크 두께
            valueBox: false, animationDuration: 150
        }).draw();

        async function conn() {
            try {
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: "Truck_RPM_Control" }],
                    optionalServices: [S_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(S_UUID);
                characteristic = await service.getCharacteristic(C_UUID);
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (e) => {
                    const v = e.target.value;
                    const cur = v.getUint16(0, true);
                    const tar = v.getUint16(2, true);
                    gauge.value = cur;
                    document.getElementById('rpmVal').innerText = cur;
                    
                    // [핵심] Target RPM을 테두리 아크로 표시
                    if (tar > 0) {
                        const col = tar > 1800 ? "rgba(231,76,60,0.7)" : "rgba(255,204,0,0.5)";
                        gauge.update({ highlights: [{ from: 0, to: tar, color: col }] });
                    } else { gauge.update({ highlights: [] }); }
                });
                document.getElementById('status').innerText = "Connected";
            } catch (err) { alert(err); }
        }

        async function send(val) {
            if (characteristic) await characteristic.writeValue(new Uint16Array([val]));
        }
    </script>
</body>
</html>
