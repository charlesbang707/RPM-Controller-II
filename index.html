<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J1939 RPM MASTER</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .status-header { padding: 12px; margin-bottom: 20px; border-radius: 10px; background: #333; font-weight: bold; color: #ff3b30; font-size: 14px; }
        .status-header.connected { color: #00ff88; border: 1px solid #00ff88; }
        .config-section { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        select { background: #333; color: white; border: 1px solid #444; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; }
        .val-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .val-card { background: #262626; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .val-num { font-size: 26px; font-weight: bold; }
        button { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; margin-top: 10px; }
        .btn-conn { background: #007aff; margin-bottom: 10px; }
        .btn-start { background: #28a745; }
        .btn-stop { background: #dc3545; }
        .btn-step { background: #444; }
    </style>
</head>
<body>
    <div class="container">
        <h3>J1939 PRO CONTROL</h3>
        <div id="stat" class="status-header">SYSTEM DISCONNECTED</div>

        <div class="config-section">
            <div>
                <small>SOURCE ADDR</small>
                <select id="sa" onchange="sendCmd(0xA2, this.value)">
                    <option value="11">0x0B (기본)</option>
                    <option value="128">0x80 (Sim)</option>
                    <option value="44">0x2C (대체)</option>
                </select>
            </div>
            <div>
                <small>BAUDRATE</small>
                <select id="bd" onchange="if(confirm('설정 변경 후 기기를 재부팅하시겠습니까?')) sendCmd(0xA1, this.value)">
                    <option value="500">500k</option>
                    <option value="250">250k</option>
                </select>
            </div>
        </div>

        <button id="cn" class="btn-conn" onclick="connect()">CONNECT TO DEVICE</button>
        <canvas id="gauge"></canvas>

        <div class="val-grid">
            <div class="val-card"><div id="cur" class="val-num" style="color:#00ff88">0</div><small>CURRENT</small></div>
            <div class="val-card"><div id="tar" class="val-num" style="color:#ffcc00">1000</div><small>TARGET</small></div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-start" onclick="sendCmd(0xA3, 1)">START</button>
            <button class="btn-stop" onclick="sendCmd(0xA3, 0)">STOP</button>
            <button class="btn-step" onclick="sendCmd(0xA4, 1)">RPM UP</button>
            <button class="btn-step" onclick="sendCmd(0xA4, 0)">RPM DOWN</button>
        </div>
    </div>

    <script>
        let char;
        const g = new RadialGauge({
            renderTo: 'gauge', width: 300, height: 300, units: "RPM", minValue: 0, maxValue: 3000,
            majorTicks: ["0","500","1000","1500","2000","2500","3000"],
            colorPlate: "#1e1e1e", colorNumbers: "#ccc", colorMajorTicks: "#888", colorNeedle: "#ff3b30"
        }).draw();

        async function connect() {
            try {
                const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ["6e400001-b5a3-f393-e0a9-e50e24dcca9e"] }] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService("6e400001-b5a3-f393-e0a9-e50e24dcca9e");
                char = await service.getCharacteristic("6e400002-b5a3-f393-e0a9-e50e24dcca9e");
                await char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (e) => {
                    const v = e.target.value;
                    const c = v.getUint8(0) | (v.getUint8(1) << 8);
                    const t = v.getUint8(2) | (v.getUint8(3) << 8);
                    g.value = c; document.getElementById('cur').innerText = c; document.getElementById('tar').innerText = t;
                });
                document.getElementById('stat').innerText = "SYSTEM CONNECTED";
                document.getElementById('stat').classList.add('connected');
                document.getElementById('cn').style.display = "none";
            } catch (err) { alert("Error: " + err); }
        }

        async function sendCmd(t, v) {
            if (char) await char.writeValue(new Uint8Array([t, parseInt(v)]));
        }
    </script>
</body>
</html>
