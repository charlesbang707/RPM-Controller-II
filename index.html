<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Truck RPM Controller</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { 
            background-color: #1a1a1a; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden;
        }
        
        /* 상단 상태 바 */
        .top-bar { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        #status { font-size: 14px; color: #888; font-weight: bold; }
        .btn-connect { 
            padding: 8px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer;
            background: #444; color: white; box-shadow: 0 4px #222;
        }
        .btn-connect.connected { background: #2ecc71; box-shadow: 0 4px #27ae60; }
        .btn-connect:active { transform: translateY(2px); box-shadow: 0 2px #222; }

        /* 엔진 RPM 타이틀 */
        .gauge-title {
            font-size: 24px; font-weight: 800; color: #2ecc71; margin-top: 10px; margin-bottom: -10px;
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.5);
        }

        /* 게이지 컨테이너 */
        .gauge-container { width: 100%; max-width: 340px; margin: 10px 0; }

        /* 컨트롤 버튼 레이아웃 */
        .controls { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; 
            width: 100%; max-width: 360px; margin-top: 5px; 
        }
        
        .btn {
            padding: 20px 0; font-size: 18px; font-weight: bold; border-radius: 12px; border: none; cursor: pointer;
            color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            transition: all 0.1s;
        }

        /* 개별 버튼 디자인 */
        .btn-up { background: linear-gradient(145deg, #3498db, #2980b9); box-shadow: 0 6px #1c5980; }
        .btn-down { background: linear-gradient(145deg, #e67e22, #d35400); box-shadow: 0 6px #a04000; }
        .btn-start { background: linear-gradient(145deg, #2ecc71, #27ae60); box-shadow: 0 6px #1e8449; }
        .btn-stop { background: linear-gradient(145deg, #e74c3c, #c0392b); box-shadow: 0 6px #942a1e; }

        .btn:active { transform: translateY(4px); box-shadow: 0 2px rgba(0,0,0,0.5); }

        /* 통신 속도 설정 */
        .baud-rate { margin-top: 20px; display: flex; gap: 10px; }
        .btn-small { padding: 5px 10px; font-size: 12px; background: #333; border: 1px solid #555; color: #ccc; border-radius: 5px; }
        .btn-small.active { background: #2ecc71; color: white; border-color: #27ae60; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div id="status">DISCONNECTED</div>
        <button id="connectBtn" class="btn-connect" onclick="connectBLE()">CONNECT</button>
    </div>

    <div class="gauge-title">ENGINE RPM</div>

    <div class="gauge-container">
        <canvas id="gauge-rpm"></canvas>
    </div>

    <div class="controls">
        <button class="btn btn-up" onclick="sendCmd('UP')">RPM UP ▲</button>
        <button class="btn btn-down" onclick="sendCmd('DOWN')">RPM DOWN ▼</button>
        <button class="btn btn-start" onclick="sendCmd('START')">START</button>
        <button class="btn btn-stop" onclick="sendCmd('STOP')">STOP</button>
    </div>

    <div class="baud-rate">
        <button id="btn250" class="btn-small" onclick="setBaud(250)">CAN 250K</button>
        <button id="btn500" class="btn-small active" onclick="setBaud(500)">CAN 500K</button>
    </div>

    <script>
        let bleDevice, bleChar;
        const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const CHAR_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

        // 게이지 초기화
        const gauge = new RadialGauge({
            renderTo: 'gauge-rpm',
            width: 320,
            height: 320,
            units: "RPM",
            minValue: 0,
            maxValue: 3000,
            majorTicks: ["0", "500", "1000", "1500", "2000", "2500", "3000"],
            minorTicks: 2,
            ticksAngle: 250,
            startAngle: 55,
            strokeTicks: true,
            highlights: [
                { "from": 2200, "to": 3000, "color": "rgba(200, 50, 50, .75)" }
            ],
            colorPlate: "#1a1a1a",
            colorMajorTicks: "#f5f5f5",
            colorMinorTicks: "#ddd",
            colorNumbers: "#eee",
            colorUnits: "#2ecc71",
            colorValueText: "#fff",
            borderShadowWidth: 0,
            borders: false,
            needleType: "arrow",
            needleWidth: 3,
            needleCircleSize: 7,
            needleCircleOuter: true,
            needleCircleInner: false,
            animationDuration: 500,
            animationRule: "linear",
            // 디지털 숫자 설정 (정수로 표시)
            valueBox: true,
            valueInt: 1,
            valueDec: 0, // 소수점 제거
            fontValueSize: 40,
            title: "" // 게이지 내부 타이틀 제거 (겹침 방지)
        }).draw();

        async function connectBLE() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'ESP32_RPM' }],
                    optionalServices: [SERVICE_UUID]
                });
                
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleChar = await service.getCharacteristic(CHAR_UUID);
                
                await bleChar.startNotifications();
                bleChar.addEventListener('characteristicvaluechanged', handleData);
                
                document.getElementById('status').innerText = "CONNECTED";
                document.getElementById('status').style.color = "#2ecc71";
                document.getElementById('connectBtn').innerText = "DISCONNECT";
                document.getElementById('connectBtn').classList.add('connected');
                
                bleDevice = device;
            } catch (error) {
                console.log(error);
                alert("연결 실패: " + error);
            }
        }

        function handleData(event) {
            let data = event.target.value;
            // ESP32에서 보낸 데이터 해석 (2바이트씩 Current RPM, Target RPM)
            let currentRPM = data.getUint16(0, true);
            let targetRPM = data.getUint16(2, true);
            
            gauge.value = currentRPM;

            // Target RPM 영역 시각화 (하이라이트 업데이트)
            if (targetRPM > 0) {
                gauge.update({
                    highlights: [
                        { from: 0, to: targetRPM, color: "rgba(46, 204, 113, 0.2)" },
                        { from: 2200, to: 3000, color: "rgba(200, 50, 50, .75)" }
                    ]
                });
            }
        }

        async function sendCmd(cmd) {
            if (!bleChar) return;
            let encoder = new TextEncoder();
            await bleChar.writeValue(encoder.encode(cmd));
        }

        async function setBaud(val) {
            document.getElementById('btn250').classList.toggle('active', val === 250);
            document.getElementById('btn500').classList.toggle('active', val === 500);
            if (bleChar) {
                let encoder = new TextEncoder();
                await bleChar.writeValue(encoder.encode("BAUD:" + val));
            }
        }
    </script>
</body>
</html>
