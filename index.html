<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J1939 Master Control</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }
        
        /* 헤더 및 연결 버튼 */
        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 5px 10px; }
        #status { font-size: 13px; color: #ff4757; font-weight: bold; }
        .conn-btn { background: #2f3542; border: none; color: white; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        /* 게이지 확대 및 중앙 배치 */
        #gauge-wrapper { position: relative; width: 380px; height: 380px; display: flex; justify-content: center; align-items: center; }
        #target-num { position: absolute; bottom: 85px; font-size: 55px; font-weight: 800; color: #00ff9d; font-family: monospace; text-shadow: 0 0 15px rgba(0, 255, 157, 0.4); }

        .section { background: #1e272e; padding: 15px; border-radius: 20px; width: 100%; box-sizing: border-box; }
        .label { font-size: 11px; color: #808e9b; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; letter-spacing: 0.5px; }
        .row { display: flex; gap: 8px; margin-bottom: 8px; }
        
        /* 제어 버튼 스타일 */
        .btn { flex: 1; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; color: white; }
        .resume { background: #2ecc71; } .stop { background: #ea2027; }
        .up { background: #0652dd; } .down { background: #57606f; }
        .baud { background: #2f3542; color: #808e9b; } .baud.active { background: #1e90ff; color: white; }

        /* 입력 및 선택 UI */
        select, input { background: #2f3542; color: white; border: none; padding: 10px; border-radius: 8px; flex: 1; font-size: 14px; }
        .set-btn { background: #ffa502; color: #2f3542; font-weight: bold; padding: 0 15px; border-radius: 8px; border: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div id="status">● DISCONNECTED</div>
        <button class="conn-btn" onclick="connect()">CONNECT BLE</button>
    </div>

    <div id="gauge-wrapper">
        <canvas id="gauge-rpm"></canvas>
        <div id="target-num">0000</div>
    </div>

    <div class="section">
        <div class="label">Source Address (Manufacturer)</div>
        <div class="row">
            <select id="sa-preset" onchange="document.getElementById('sa-input').value = this.value">
                <option value="229">Direct (0xE5)</option>
                <option value="232">Caterpillar (0xE8)</option>
                <option value="247">Cummins (0xF7)</option>
                <option value="0">Engine #1 (0x00)</option>
                <option value="33">Body Controller (0x21)</option>
            </select>
            <input id="sa-input" type="number" value="229">
            <button class="set-btn" onclick="setSA()">SET</button>
        </div>
    </div>

    <div class="section">
        <div class="label">Baud Rate</div>
        <div class="row">
            <button id="b250" class="btn baud active" onclick="sendBaud(250)">250K</button>
            <button id="b500" class="btn baud" onclick="sendBaud(500)">500K</button>
        </div>
    </div>

    <div class="section">
        <div class="label">Speed Control</div>
        <div class="row">
            <button class="btn resume" onclick="sendCmd(1000)">RESUME</button>
            <button class="btn stop" onclick="sendCmd(600)">STOP</button>
        </div>
        <div class="row">
            <button class="btn up" onclick="sendCmd(1)">RPM UP</button>
            <button class="btn down" onclick="sendCmd(2)">RPM DOWN</button>
        </div>
    </div>
</div>

<script>
    const gauge = new RadialGauge({
        renderTo: 'gauge-rpm', width: 380, height: 380, minValue: 0, maxValue: 3000,
        majorTicks: ["0","500","1000","1500","2000","2500","3000"],
        colorPlate: "#0a0a0a", colorNumbers: "#fff", needleType: "arrow",
        needleWidth: 3, needleColor: "#fff",
        // 2. 반투명한 아크로 Target RPM 표시 (rgba 사용)
        barWidth: 12, colorBar: "rgba(255,255,255,0.05)", colorBarProgress: "rgba(0, 255, 157, 0.5)",
        valueBox: false, highlights: [{ from: 2500, to: 3000, color: "rgba(234, 32, 39, 0.3)" }],
        animationDuration: 150, animationRule: "linear"
    }).draw();

    let char;
    async function connect() {
        const dev = await navigator.bluetooth.requestDevice({ filters: [{ services: ["4fafc201-1fb5-459e-8fcc-c5c9c331914b"] }] });
        const server = await dev.gatt.connect();
        const service = await server.getPrimaryService("4fafc201-1fb5-459e-8fcc-c5c9c331914b");
        char = await service.getCharacteristic("beb5483e-36e1-4688-b7f5-ea07361b26a8");
        await char.startNotifications();
        char.addEventListener('characteristicvaluechanged', (e) => {
            const data = e.target.value;
            const cur = data.getUint16(0, true);
            const tar = data.getUint16(2, true);
            const is500 = data.getUint8(4) === 1;

            gauge.value = cur; // 바늘 -> Current RPM
            gauge.update({ barProgress: tar }); // 반투명 아크 -> Target RPM
            document.getElementById('target-num').innerText = tar; // 숫자 -> Target RPM
            
            document.getElementById('status').innerText = "● CONNECTED";
            document.getElementById('status').style.color = "#00ff9d";
            document.getElementById('b500').className = is500 ? "btn baud active" : "btn baud";
            document.getElementById('b250').className = is500 ? "btn baud" : "btn baud active";
        });
    }

    async function sendCmd(v) { if(char) await char.writeValue(new Uint16Array([v])); }
    function sendBaud(k) { sendCmd(k === 500 ? 0x5000 : 0x2500); }
    function setSA() { const sa = parseInt(document.getElementById('sa-input').value); sendCmd(0xA500 | sa); }
</script>
</body>
</html>
