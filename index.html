<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Truck RPM Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { 
            background-color: #1a1a1a; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            min-height: 95vh; padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        .top-bar { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        #status { font-size: 14px; color: #888; font-weight: bold; }
        .btn-connect { 
            background: linear-gradient(to bottom, #555 0%, #333 100%); border: 1px solid #222;
            color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 4px 0 #111, 0 5px 5px rgba(0,0,0,0.5);
            transition: all 0.1s;
        }
        .btn-connect:active { transform: translateY(3px); }
        .btn-connect.connected { background: linear-gradient(to bottom, #e74c3c 0%, #c0392b 100%); }

        /* SA 설정 섹션 */
        .sa-container { 
            width: 100%; max-width: 380px; display: flex; gap: 8px; align-items: center; 
            margin-bottom: 10px; background: #222; padding: 8px; border-radius: 10px; 
            border: 1px solid #333; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); 
        }
        .sa-label { font-size: 11px; color: #888; font-weight: bold; min-width: 60px; }
        .sa-select { flex: 1; background: #333; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 6px; font-weight: bold; }
        .btn-set { background: #555; color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 0 #000; }

        .gauge-wrapper { position: relative; margin: 5px 0; }
        #rpmVal { font-size: 50px; font-weight: 900; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); margin-top: -20px; }
        .target-label { font-size: 12px; color: #aaa; letter-spacing: 1px; }

        .baud-container { display: flex; gap: 10px; margin: 10px 0 15px 0; }
        .btn-baud { 
            background: linear-gradient(to bottom, #444 0%, #222 100%); border: 1px solid #111; color: #aaa; 
            padding: 8px 15px; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 3px 0 #000; transition: all 0.1s;
        }
        .btn-baud.active { color: #3498db; text-shadow: 0 0 5px rgba(52,152,219,0.5); }

        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 380px; }
        .btn { 
            padding: 20px; border-radius: 12px; font-size: 18px; font-weight: bold; color: white; border: none; cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 6px 0 rgba(0,0,0,0.6), 0 8px 6px rgba(0,0,0,0.4);
            transition: all 0.1s; text-transform: uppercase;
        }
        .btn:active { transform: translateY(4px); }
        .resume { background: linear-gradient(to bottom, #2ecc71 0%, #27ae60 100%); }
        .up { background: linear-gradient(to bottom, #3498db 0%, #2980b9 100%); }
        .stop { background: linear-gradient(to bottom, #e74c3c 0%, #c0392b 100%); }
        .down { background: linear-gradient(to bottom, #f39c12 0%, #d68910 100%); }
    </style>
</head>
<body>
    <div class="top-bar">
        <div id="status">Ready</div>
        <button id="connectBtn" class="btn-connect" onclick="toggleConnection()">CONNECT</button>
    </div>

    <div class="sa-container">
        <span class="sa-label">SOURCE ADDR</span>
        <select id="saSelect" class="sa-select">
            <option value="229">Default (0xE5)</option>
            <option value="232">Caterpillar (0xE8)</option>
            <option value="247">Cummins (0xF7)</option>
        </select>
        <button class="btn-set" onclick="setSA()">SET</button>
    </div>

    <div class="gauge-wrapper"><canvas id="gauge-rpm"></canvas></div>
    <div id="rpmVal">0</div>
    <div class="target-label">CURRENT RPM</div>

    <div class="baud-container">
        <button id="btn250" class="btn-baud active" onclick="sendCmd(250)">250 kbps</button>
        <button id="btn500" class="btn-baud" onclick="sendCmd(500)">500 kbps</button>
    </div>

    <div class="grid-container">
        <button class="btn resume" onclick="sendCmd(1000)">RESUME</button>
        <button class="btn up" onclick="sendCmd(1)">UP</button>
        <button class="btn stop" onclick="sendCmd(600)">STOP</button>
        <button class="btn down" onclick="sendCmd(2)">DOWN</button>
    </div>

    <script>
        let device, characteristic;
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        var gauge = new RadialGauge({
            renderTo: 'gauge-rpm', width: 300, height: 300,
            minValue: 0, maxValue: 3000,
            majorTicks: ["0","500","1000","1500","2000","2500","3000"],
            colorPlate: "#1a1a1a", colorMajorTicks: "#ccc", colorNumbers: "#fff",
            needleType: "arrow", needleWidth: 4, borders: true, valueBox: false,
            animationDuration: 150, animationRule: "linear"
        }).draw();

        async function toggleConnection() {
            if (device && device.gatt.connected) { device.gatt.disconnect(); return; }
            try {
                device = await navigator.bluetooth.requestDevice({ filters: [{ name: "Truck_RPM_Control" }], optionalServices: [SERVICE_UUID] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHAR_UUID);
                updateUI(true);
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (e) => {
                    let data = e.target.value;
                    let cur = data.getUint16(0, true);
                    let tar = data.getUint16(2, true);
                    gauge.value = cur;
                    document.getElementById('rpmVal').innerText = cur;
                    let color = tar > 1800 ? "rgba(231, 76, 60, 0.7)" : "rgba(46, 204, 113, 0.5)";
                    gauge.update({ highlights: tar > 0 ? [{ from: 0, to: tar, color: color }] : [] });
                });
            } catch (err) { console.error(err); }
        }

        function updateUI(connected) {
            const btn = document.getElementById('connectBtn');
            btn.innerText = connected ? "DISCONNECT" : "CONNECT";
            btn.classList.toggle('connected', connected);
            document.getElementById('status').innerText = connected ? "Connected" : "Ready";
            document.getElementById('status').style.color = connected ? "#2ecc71" : "#888";
        }

        async function sendCmd(val) {
            if (val === 250 || val === 500) {
                document.getElementById('btn250').classList.toggle('active', val === 250);
                document.getElementById('btn500').classList.toggle('active', val === 500);
                val = (val === 500) ? 0x5000 : 0x2500;
            }
            if (characteristic) await characteristic.writeValue(new Uint16Array([val]));
        }

        async function setSA() {
            const sa = parseInt(document.getElementById('saSelect').value);
            if (characteristic) await characteristic.writeValue(new Uint16Array([0xA500 | sa]));
        }
    </script>
</body>
</html>
