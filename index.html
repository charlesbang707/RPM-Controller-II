<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>RPM Controller</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 350px; margin: auto; }
        .btn { padding: 20px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; color: white; }
        .resume { background: #27ae60; } .up { background: #2980b9; } .stop { background: #c0392b; } .down { background: #f39c12; }
    </style>
</head>
<body>
    <button onclick="connectBLE()" style="margin:20px; padding:10px;">CONNECT</button>
    <canvas id="gauge"></canvas>
    <h1 id="rpm">0</h1>
    <div class="btn-grid">
        <button class="btn resume" onclick="send(1000)">RESUME</button>
        <button class="btn up" onclick="send(1)">RPM UP</button>
        <button class="btn stop" onclick="send(600)">STOP</button>
        <button class="btn down" onclick="send(2)">RPM DOWN</button>
    </div>

    <script>
        let char;
        const S_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const C_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        const gauge = new RadialGauge({
            renderTo: 'gauge', width: 300, height: 300, minValue: 0, maxValue: 3000,
            colorPlate: "#1a1a1a", colorNumbers: "#fff", highlights: [], highlightsWidth: 15
        }).draw();

        async function connectBLE() {
            const device = await navigator.bluetooth.requestDevice({ filters: [{ name: "Truck_RPM_Control" }], optionalServices: [S_UUID] });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(S_UUID);
            char = await service.getCharacteristic(C_UUID);
            await char.startNotifications();
            char.addEventListener('characteristicvaluechanged', (e) => {
                const v = e.target.value;
                const cur = v.getUint16(0, true);
                const tar = v.getUint16(2, true);
                gauge.value = cur;
                document.getElementById('rpm').innerText = cur;
                // Target RPM 아크 표시
                if (tar > 0) gauge.update({ highlights: [{ from: 0, to: tar, color: "rgba(255,204,0,0.5)" }] });
                else gauge.update({ highlights: [] });
            });
        }
        async function send(v) { if (char) await char.writeValue(new Uint16Array([v])); }
    </script>
</body>
</html>
