<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J1939 RPM Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .card { max-width: 400px; margin: auto; background: #2d2d2d; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .status-bar { font-size: 14px; padding: 8px; border-radius: 10px; margin-bottom: 20px; background: #3d3d3d; color: #ffbc00; }
        .connected { color: #00ff88 !important; }
        .rpm-display { display: flex; justify-content: space-around; margin-top: 20px; }
        .rpm-box { background: #3d3d3d; padding: 15px; border-radius: 12px; width: 40%; }
        .rpm-val { font-size: 28px; font-weight: bold; color: #00ff88; font-family: 'Courier New', monospace; }
        .rpm-label { font-size: 11px; color: #aaa; margin-top: 5px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        button { padding: 18px; font-size: 16px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .btn-conn { grid-column: span 2; background: #4a4a4a; color: white; }
        .btn-start { background: #28a745; color: white; }
        .btn-stop { background: #dc3545; color: white; }
        .btn-up { background: #007bff; color: white; }
        .btn-down { background: #6c757d; color: white; }
        button:active { transform: scale(0.96); opacity: 0.8; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0;">J1939 CONTROL</h2>
    <div id="status" class="status-bar">Bluetooth Disconnected</div>

    <canvas id="rpmGauge"></canvas>

    <div class="rpm-display">
        <div class="rpm-box">
            <div id="cur-val" class="rpm-val">0</div>
            <div class="rpm-label">CURRENT</div>
        </div>
        <div class="rpm-box">
            <div id="tar-val" class="rpm-val">0</div>
            <div class="rpm-label">TARGET</div>
        </div>
    </div>

    <div class="controls">
        <button id="connBtn" class="btn-conn" onclick="initBLE()">CONNECT SYSTEM</button>
        <button class="btn-start" onclick="sendCmd(0xA3, 1)">START</button>
        <button class="btn-stop" onclick="sendCmd(0xA3, 0)">STOP</button>
        <button class="btn-up" onclick="sendCmd(0xA4, 1)">RPM UP</button>
        <button class="btn-down" onclick="sendCmd(0xA4, 0)">RPM DOWN</button>
    </div>
</div>

<script>
    // ESP32 코드와 정확히 일치해야 함
    const UUID_SERVICE = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const UUID_CHAR    = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";

    let device, characteristic;

    // 게이지 설정
    const gauge = new RadialGauge({
        renderTo: 'rpmGauge', width: 280, height: 280, units: "RPM",
        minValue: 0, maxValue: 3000, majorTicks: ["0","500","1000","1500","2000","2500","3000"],
        minorTicks: 2, strokeTicks: true, highlights: [{"from": 2500, "to": 3000, "color": "red"}],
        colorPlate: "#2d2d2d", colorMajorTicks: "#eee", colorNumbers: "#eee",
        needleType: "arrow", needleWidth: 3, animationDuration: 400, animationRule: "decelerate"
    }).draw();

    async function initBLE() {
        try {
            const statusEl = document.getElementById('status');
            statusEl.innerText = "Requesting Device...";
            
            device = await navigator.bluetooth.requestDevice({
                filters: [{ services: [UUID_SERVICE] }]
            });

            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(UUID_SERVICE);
            characteristic = await service.getCharacteristic(UUID_CHAR);

            // 데이터 수신(Notify) 활성화
            await characteristic.startNotifications();
            characteristic.addEventListener('characteristicvaluechanged', (e) => {
                const v = e.target.value;
                const cur = v.getUint8(0) | (v.getUint8(1) << 8);
                const tar = v.getUint8(2) | (v.getUint8(3) << 8);
                
                document.getElementById('cur-val').innerText = cur;
                document.getElementById('tar-val').innerText = tar;
                gauge.value = cur;
            });

            statusEl.innerText = "System Connected";
            statusEl.classList.add('connected');
            document.getElementById('connBtn').style.display = 'none';

            device.addEventListener('gattserverdisconnected', () => {
                statusEl.innerText = "System Disconnected";
                statusEl.classList.remove('connected');
                document.getElementById('connBtn').style.display = 'block';
            });

        } catch (err) {
            console.error(err);
            document.getElementById('status').innerText = "Connection Failed";
        }
    }

    async function sendCmd(type, val) {
        if (!characteristic) return;
        try {
            await characteristic.writeValue(new Uint8Array([type, val]));
        } catch (err) { console.error(err); }
    }
</script>
</body>
</html>
