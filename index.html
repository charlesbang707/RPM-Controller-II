<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J1939 Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 15px; }
        .top-bar { width: 100%; max-width: 400px; display: flex; justify-content: space-between; margin-bottom: 20px; }
        .btn-connect { background: #333; color: white; border: 1px solid #444; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-connect.connected { background: #e74c3c; }
        
        /* 게이지 스타일 */
        .gauge-wrapper { position: relative; width: 320px; height: 320px; margin-top: 10px; }
        #targetDisplay {
            position: absolute; top: 72%; left: 50%; transform: translate(-50%, -50%);
            font-size: 20px; font-weight: bold; color: #3498db; text-shadow: 0 0 10px rgba(52,152,219,0.5);
            pointer-events: none; z-index: 10;
        }

        .baud-container { display: flex; gap: 10px; margin: 30px 0; }
        .btn-baud { background: #222; color: #888; border: 1px solid #444; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-baud.active { border-color: #3498db; color: #3498db; background: rgba(52,152,219,0.1); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 380px; }
        .btn { padding: 22px; border-radius: 12px; font-size: 18px; font-weight: bold; color: white; border: none; cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.5); }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.5); }
        .resume { background: #2ecc71; } .up { background: #3498db; } .stop { background: #e74c3c; } .down { background: #f39c12; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div id="status" style="color:#888">DISCONNECTED</div>
        <button id="connectBtn" class="btn-connect" onclick="toggleConnection()">CONNECT</button>
    </div>

    <div class="gauge-wrapper">
        <canvas id="gauge-rpm"></canvas>
        <div id="targetDisplay">0</div>
    </div>
    
    <div class="baud-container">
        <button id="btn250" class="btn-baud active" onclick="changeBaud(250)">250K</button>
        <button id="btn500" class="btn-baud" onclick="changeBaud(500)">500K</button>
    </div>

    <div class="grid">
        <button class="btn resume" onclick="sendCmd(1000)">RESUME</button>
        <button class="btn up" onclick="sendCmd(1)">UP</button>
        <button class="btn stop" onclick="sendCmd(600)">STOP</button>
        <button class="btn down" onclick="sendCmd(2)">DOWN</button>
    </div>

    <script>
        let device, characteristic;
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        // 3D 스타일 및 타겟 아크 복구
        var gauge = new RadialGauge({
            renderTo: 'gauge-rpm', width: 320, height: 320,
            minValue: 0, maxValue: 3000,
            majorTicks: ["0","500","1000","1500","2000","2500","3000"],
            colorPlate: "#1a1a1a", 
            borderShadowWidth: 20, borderInnerWidth: 2, borderMiddleWidth: 4, borderOuterWidth: 8,
            colorBorderOuter: "#333", colorBorderOuterEnd: "#111",
            needleType: "arrow", needleWidth: 4, needleCircleSize: 7,
            colorNeedle: "rgba(255, 255, 255, 0.8)", colorNeedleEnd: "rgba(255, 255, 255, 0.8)",
            valueBox: false,
            // 타겟 RPM 표시 아크(Highlights)
            highlights: [{ from: 0, to: 0, color: "rgba(46, 204, 113, 0.3)" }],
            animationDuration: 150, animationRule: "linear"
        }).draw();

        async function toggleConnection() {
            if (device && device.gatt.connected) { device.gatt.disconnect(); return; }
            try {
                device = await navigator.bluetooth.requestDevice({ filters: [{ name: "Truck_RPM_Control" }], optionalServices: [SERVICE_UUID] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHAR_UUID);
                
                document.getElementById('status').innerText = "CONNECTED";
                document.getElementById('connectBtn').innerText = "DISCONNECT";
                document.getElementById('connectBtn').classList.add('connected');

                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (e) => {
                    let data = e.target.value;
                    let cur = data.getUint16(0, true);
                    let tar = data.getUint16(2, true);
                    let baud = data.getUint8(4);
                    
                    gauge.value = cur;
                    document.getElementById('targetDisplay').innerText = tar;
                    
                    // 타겟 아크 업데이트
                    gauge.update({ highlights: [{ from: 0, to: tar, color: "rgba(46, 204, 113, 0.3)" }] });
                    
                    document.getElementById('btn250').classList.toggle('active', baud === 0);
                    document.getElementById('btn500').classList.toggle('active', baud === 1);
                });
            } catch (err) { console.log(err); }
        }

        async function sendCmd(val) { if (characteristic) await characteristic.writeValue(new Uint16Array([val])); }
        async function changeBaud(baud) {
            let val = (baud === 500) ? 0x5000 : 0x2500;
            if (characteristic) await characteristic.writeValue(new Uint16Array([val]));
        }
    </script>
</body>
</html>
