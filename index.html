<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J1939 TRUCK CONTROL</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 15px; touch-action: manipulation; }
        .card { max-width: 420px; margin: auto; background: #2d2d2d; padding: 20px; border-radius: 20px; }
        .status-bar { font-size: 14px; padding: 10px; border-radius: 10px; margin-bottom: 15px; background: #3d3d3d; color: #ffbc00; }
        .connected { color: #00ff88 !important; border: 1px solid #00ff88; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 18px; font-size: 16px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; }
        .btn-conn { grid-column: span 2; background: #007bff; color: white; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h3>J1939 TRUCK CONTROL</h3>
    <div id="status" class="status-bar">Disconnected</div>
    <canvas id="gauge"></canvas>
    <div class="controls">
        <button id="connBtn" class="btn-conn" onclick="initBLE()">CONNECT SYSTEM</button>
        <button style="background:#28a745; color:white;" onclick="send(0xA3, 1)">START</button>
        <button style="background:#dc3545; color:white;" onclick="send(0xA3, 0)">STOP</button>
    </div>
</div>

<script>
    // ESP32 코드와 정확히 일치해야 함
    const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const CHAR_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
    let device, characteristic;

    const gauge = new RadialGauge({
        renderTo: 'gauge', width: 300, height: 300, units: "RPM", minValue: 0, maxValue: 3000,
        colorPlate: "#2d2d2d", colorMajorTicks: "#eee", colorNumbers: "#eee", animationDuration: 150
    }).draw();

    async function initBLE() {
        try {
            document.getElementById('status').innerText = "Searching...";
            // iPhone/Bluefy에서 가장 잘 작동하는 검색 방식
            device = await navigator.bluetooth.requestDevice({
                filters: [{ services: [SERVICE_UUID] }]
            });

            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            characteristic = await service.getCharacteristic(CHAR_UUID);

            await characteristic.startNotifications();
            characteristic.oncharacteristicvaluechanged = (event) => {
                const val = event.target.value;
                const rpm = val.getUint8(0) | (val.getUint8(1) << 8);
                gauge.value = rpm;
            };

            document.getElementById('status').innerText = "System Connected";
            document.getElementById('status').classList.add('connected');
            document.getElementById('connBtn').style.display = 'none';
        } catch (error) {
            console.log(error);
            document.getElementById('status').innerText = "Connection Failed";
        }
    }

    async function send(type, val) {
        if (characteristic) {
            await characteristic.writeValue(new Uint8Array([type, val]));
        }
    }
</script>
</body>
</html>
