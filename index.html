<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J1939 Controller</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { background: #000; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .main-container { position: relative; width: 100%; max-width: 400px; text-align: center; }
        
        /* 상단 최소 상태바 */
        .top-bar { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; z-index: 10; }
        .info-text { color: #555; font-size: 12px; }

        /* 게이지 스타일 */
        #gauge-container { margin-top: 20px; }

        /* 하단 숨겨진 메뉴 (필요할 때만 터치) */
        .bottom-controls { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .btn { background: #1a1a1a; color: #444; border: 1px solid #333; padding: 10px 15px; border-radius: 8px; font-size: 12px; cursor: pointer; }
        .btn.active { color: #00ff9d; border-color: #00ff9d; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="top-bar">
        <span id="status" style="color: #444;">● OFFLINE</span>
        <button class="btn" onclick="connectBLE()">CONNECT</button>
    </div>

    <div id="gauge-container">
        <canvas id="gauge-rpm"></canvas>
    </div>

    <div class="bottom-controls">
        <button id="b250" class="btn active" onclick="sendBaud(250)">250K</button>
        <button id="b500" class="btn" onclick="sendBaud(500)">500K</button>
        <select id="sa-select" class="btn" onchange="sendSA(this.value)">
            <option value="229">E5 (Def)</option>
            <option value="232">E8 (Cat)</option>
            <option value="247">F7 (Cum)</option>
        </select>
    </div>
</div>

<script>
    // 사용자님이 주신 "두 번째 이미지"의 게이지 및 디지털 숫자 구현
    var gauge = new RadialGauge({
        renderTo: 'gauge-rpm',
        width: 380, height: 380,
        minValue: 0, maxValue: 3000,
        majorTicks: ["0","5","10","15","20","25","30"], // x100 형태
        minorTicks: 2,
        strokeTicks: true,
        highlights: [{ from: 2500, to: 3000, color: "rgba(200, 50, 50, .75)" }],
        colorPlate: "#000",
        colorMajorTicks: "#ddd",
        colorMinorTicks: "#666",
        colorNumbers: "#eee",
        colorUnits: "#ccc",
        colorNumbers: "#fff",
        // 바늘 설정
        needleType: "arrow",
        needleWidth: 2,
        needleColor: "#fff",
        needleCircleSize: 7,
        needleCircleOuter: true,
        needleCircleInner: false,
        // 중앙 디지털 숫자 (Target RPM 표시)
        valueBox: true,
        valueInt: 0,
        valueDec: 0,
        colorValueBoxRect: "rgba(0,0,0,0)",
        colorValueBoxRectEnd: "rgba(0,0,0,0)",
        colorValueBoxBackground: "rgba(0,0,0,0)",
        colorValueText: "#00ff9d", // 디지털 숫자 색상
        fontValue: "monospace",
        // 아크 설정
        barWidth: 8,
        colorBarProgress: "rgba(0, 255, 157, .5)",
        colorBar: "rgba(50, 50, 50, .2)",
        animationDuration: 150,
        animationRule: "linear"
    }).draw();

    let bleChar;
    async function connectBLE() {
        const dev = await navigator.bluetooth.requestDevice({ filters: [{ services: ["4fafc201-1fb5-459e-8fcc-c5c9c331914b"] }] });
        const server = await dev.gatt.connect();
        const service = await server.getPrimaryService("4fafc201-1fb5-459e-8fcc-c5c9c331914b");
        bleChar = await service.getCharacteristic("beb5483e-36e1-4688-b7f5-ea07361b26a8");
        
        document.getElementById('status').innerText = "● ONLINE";
        document.getElementById('status').style.color = "#00ff9d";

        await bleChar.startNotifications();
        bleChar.addEventListener('characteristicvaluechanged', (e) => {
            const v = e.target.value;
            const cur = v.getUint16(0, true);
            const tar = v.getUint16(2, true);
            const is500 = v.getUint8(4) === 1;

            gauge.value = tar; // 중앙 디지털 숫자 -> Target
            gauge.update({ needleValue: cur, barProgress: tar }); // 바늘 -> Current
            
            document.getElementById('b500').className = is500 ? "btn active" : "btn";
            document.getElementById('b250').className = is500 ? "btn" : "btn active";
        });
    }

    function send(v) { if(bleChar) bleChar.writeValue(new Uint16Array([v])); }
    function sendBaud(k) { send(k === 500 ? 0x5000 : 0x2500); }
    function sendSA(sa) { send(0xA500 | parseInt(sa)); }
    
    // 버튼 기능 (화면엔 안 보이지만 작동)
    window.addEventListener('keydown', (e) => {
        if(e.key === 'ArrowUp') send(1);
        if(e.key === 'ArrowDown') send(2);
    });
</script>
</body>
</html>
