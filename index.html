<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J1939 Advanced Control</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 15px; touch-action: manipulation; }
        .card { max-width: 420px; margin: auto; background: #2d2d2d; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        .status-bar { font-size: 14px; padding: 10px; border-radius: 10px; margin-bottom: 15px; background: #3d3d3d; color: #ffbc00; }
        .connected { color: #00ff88 !important; border: 1px solid #00ff88; }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; padding: 10px; background: #383838; border-radius: 12px; }
        select { width: 100%; padding: 10px; border-radius: 6px; background: #444; color: white; border: 1px solid #555; font-size: 14px; }
        .rpm-display { display: flex; justify-content: space-around; margin: 15px 0; }
        .rpm-box { background: #3d3d3d; padding: 12px; border-radius: 12px; width: 45%; }
        .rpm-val { font-size: 26px; font-weight: bold; color: #00ff88; font-family: monospace; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 16px; font-size: 16px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; transition: 0.2s; touch-action: manipulation; -webkit-user-select: none; }
        .btn-conn { grid-column: span 2; background: #4a4a4a; color: white; margin-bottom: 10px; }
        .btn-start { background: #28a745; color: white; } .btn-stop { background: #dc3545; color: white; }
        .btn-up { background: #007bff; color: white; } .btn-down { background: #6c757d; color: white; }
        
        /* 커스텀 팝업 스타일 */
        #popup-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; }
        #custom-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; max-width: 300px; background: #333; padding: 25px; border-radius: 20px; z-index: 101; border: 1px solid #555; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .popup-btns { display: flex; gap: 10px; margin-top: 20px; }
        .popup-btns button { flex: 1; padding: 12px; border-radius: 10px; font-size: 16px; border: none; cursor: pointer; }
        .btn-yes { background: #28a745; color: white; }
        .btn-no { background: #666; color: white; }
    </style>
</head>
<body>

<div id="popup-overlay"></div>
<div id="custom-popup">
    <p id="popup-msg" style="margin: 0; line-height: 1.5; font-size: 16px;">설정을 변경하시겠습니까?<br>변경 시 기기가 리셋됩니다.</p>
    <div class="popup-btns">
        <button class="btn-yes" onclick="confirmConfig()">예</button>
        <button class="btn-no" onclick="closePopup()">아니오</button>
    </div>
</div>

<div class="card">
    <h3 style="margin-top:0; color:#eee;">J1939 TRUCK CONTROL</h3>
    <div id="status" class="status-bar">Bluetooth Disconnected</div>
    <div class="settings-grid">
        <div>
            <label style="font-size:11px; color:#aaa; display:block; margin-bottom:5px;">SA</label>
            <select id="sa-select" onchange="showPopup('SA', 0xA2, this.value)">
                <option value="11">0x0B (기본)</option>
                <option value="0">0x00 (엔진)</option>
            </select>
        </div>
        <div>
            <label style="font-size:11px; color:#aaa; display:block; margin-bottom:5px;">BAUDRATE</label>
            <select id="baud-select" onchange="showPopup('Baudrate', 0xA1, this.value)">
                <option value="500">500k</option>
                <option value="250">250k</option>
            </select>
        </div>
    </div>
    <canvas id="rpmGauge"></canvas>
    <div class="rpm-display">
        <div class="rpm-box"><div id="cur-val" class="rpm-val">0000</div><div style="font-size:10px; color:#aaa;">CURRENT</div></div>
        <div class="rpm-box"><div id="tar-val" class="rpm-val">0000</div><div style="font-size:10px; color:#aaa;">TARGET</div></div>
    </div>
    <div class="controls">
        <button id="connBtn" class="btn-conn" onclick="initBLE()">CONNECT SYSTEM</button>
        <button class="btn-start" onclick="sendCmd(0xA3, 1)">START</button>
        <button class="btn-stop" onclick="sendCmd(0xA3, 0)">STOP</button>
        <button class="btn-up" onclick="sendCmd(0xA4, 1)">RPM UP</button>
        <button class="btn-down" onclick="sendCmd(0xA4, 0)">RPM DOWN</button>
    </div>
</div>

<script>
    const UUID_SERVICE = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const UUID_CHAR    = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
    let device, characteristic, pendingConfig = null;

    const gauge = new RadialGauge({
        renderTo: 'rpmGauge', width: 300, height: 300, units: "RPM", minValue: 0, maxValue: 3000,
        majorTicks: ["0","500","1000","1500","2000","2500","3000"], colorPlate: "#2d2d2d", colorMajorTicks: "#eee", colorNumbers: "#eee",
        needleType: "arrow", needleWidth: 3, animationDuration: 150, animationRule: "linear", highlights: []
    }).draw();

    async function initBLE() {
        try {
            document.getElementById('status').innerText = "Scanning...";
            device = await navigator.bluetooth.requestDevice({ filters: [{ services: [UUID_SERVICE] }] });
            device.addEventListener('gattserverdisconnected', onDisconnected);
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(UUID_SERVICE);
            characteristic = await service.getCharacteristic(UUID_CHAR);
            await characteristic.startNotifications();
            characteristic.addEventListener('characteristicvaluechanged', (e) => {
                const v = e.target.value;
                const cur = v.getUint8(0) | (v.getUint8(1) << 8);
                const tar = v.getUint8(2) | (v.getUint8(3) << 8);
                document.getElementById('cur-val').innerText = cur.toString().padStart(4, '0');
                document.getElementById('tar-val').innerText = tar.toString().padStart(4, '0');
                gauge.value = cur;
                gauge.update({ highlights: [{ "from": 0, "to": tar, "color": "rgba(0, 255, 136, 0.3)" }, { "from": 2500, "to": 3000, "color": "rgba(255, 0, 0, 0.7)" }] });
            });
            document.getElementById('status').innerText = "System Connected";
            document.getElementById('status').classList.add('connected');
            document.getElementById('connBtn').style.display = 'none';
        } catch (err) { document.getElementById('status').innerText = "Retry Connection"; }
    }

    function onDisconnected() {
        document.getElementById('status').innerText = "Disconnected";
        document.getElementById('status').classList.remove('connected');
        document.getElementById('connBtn').style.display = 'block';
        gauge.value = 0;
    }

    function showPopup(label, type, val) {
        if (!characteristic) { alert("연결이 필요합니다."); return; }
        pendingConfig = { type, val };
        document.getElementById('popup-overlay').style.display = 'block';
        document.getElementById('custom-popup').style.display = 'block';
    }

    function closePopup() {
        document.getElementById('popup-overlay').style.display = 'none';
        document.getElementById('custom-popup').style.display = 'none';
    }

    async function confirmConfig() {
        if (pendingConfig && characteristic) {
            await characteristic.writeValue(new Uint8Array([pendingConfig.type, parseInt(pendingConfig.val)]));
            if (device.gatt.connected) await device.gatt.disconnect();
            closePopup();
        }
    }

    async function sendCmd(type, val) {
        if (characteristic) await characteristic.writeValue(new Uint8Array([type, val]));
    }
</script>
</body>
</html>
