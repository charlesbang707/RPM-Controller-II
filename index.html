<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>J1939 MASTER</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { background: #111; color: #eee; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .card { max-width: 400px; margin: auto; background: #222; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .status { padding: 12px; margin-bottom: 20px; border-radius: 10px; background: #333; font-weight: bold; color: #ff3b30; }
        .status.on { color: #00ff88; border: 1px solid #00ff88; }
        .setup-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        select { background: #444; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; }
        .gauge-area { margin: 10px 0; }
        .val-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .val-item { background: #2a2a2a; padding: 15px; border-radius: 12px; }
        .val-item div { font-size: 24px; font-weight: bold; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; }
        .btn-conn { background: #007aff; width: 100%; margin-bottom: 15px; }
        .btn-start { background: #28a745; } .btn-stop { background: #ff3b30; }
        .btn-step { background: #555; }
    </small></style>
</head>
<body>
    <div class="card">
        <h3>J1939 CONTROLLER</h3>
        <div id="stat" class="status">NOT CONNECTED</div>
        
        <div class="setup-row">
            <div>
                <small>SOURCE ADDR</small>
                <select id="sa" onchange="send(0xA2, this.value)">
                    <option value="11">0x0B (Default)</option>
                    <option value="128">0x80 (Sim)</option>
                    <option value="44">0x2C (Alt)</option>
                </select>
            </div>
            <div>
                <small>BAUDRATE</small>
                <select id="bd" onchange="if(confirm('재부팅하시겠습니까?')) send(0xA1, this.value)">
                    <option value="500">500k</option>
                    <option value="250">250k</option>
                </select>
            </div>
        </div>

        <button id="cn" class="btn-conn" onclick="conn()">CONNECT DEVICE</button>
        <div class="gauge-area"><canvas id="gauge"></canvas></div>

        <div class="val-grid">
            <div class="val-item"><div id="cur" style="color:#00ff88">0</div><small>CURRENT</small></div>
            <div class="val-item"><div id="tar" style="color:#ffcc00">1000</div><small>TARGET</small></div>
        </div>

        <div class="btn-grid">
            <button class="btn-start" onclick="send(0xA3, 1)">START</button>
            <button class="btn-stop" onclick="send(0xA3, 0)">STOP</button>
            <button class="btn-step" onclick="send(0xA4, 1)">RPM UP</button>
            <button class="btn-step" onclick="send(0xA4, 0)">RPM DOWN</button>
        </div>
    </div>

    <script>
        let char;
        const g = new RadialGauge({
            renderTo: 'gauge', width: 300, height: 300, units: "RPM", minValue: 0, maxValue: 3000,
            majorTicks: ["0","500","1000","1500","2000","2500","3000"],
            colorPlate: "#222", colorNumbers: "#ccc", colorMajorTicks: "#777", colorNeedle: "#ff3b30"
        }).draw();

        async function conn() {
            try {
                const d = await navigator.bluetooth.requestDevice({ filters: [{ services: ["6e400001-b5a3-f393-e0a9-e50e24dcca9e"] }] });
                const s = await d.gatt.connect();
                const sv = await s.getPrimaryService("6e400001-b5a3-f393-e0a9-e50e24dcca9e");
                char = await sv.getCharacteristic("6e400002-b5a3-f393-e0a9-e50e24dcca9e");
                await char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (e) => {
                    const v = e.target.value;
                    const c = v.getUint8(0) | (v.getUint8(1) << 8);
                    const t = v.getUint8(2) | (v.getUint8(3) << 8);
                    g.value = c; document.getElementById('cur').innerText = c; document.getElementById('tar').innerText = t;
                });
                document.getElementById('stat').innerText = "CONNECTED";
                document.getElementById('stat').className = "status on";
                document.getElementById('cn').style.display = "none";
            } catch (e) { alert(e); }
        }

        async function send(t, v) {
            if(char) await char.writeValue(new Uint8Array([t, parseInt(v)]));
        }
    </script>
</body>
</html>
