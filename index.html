<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J1939 RPM Controller</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        
        body {
            font-family: 'Roboto', sans-serif;
            text-align: center;
            background: #0f0f0f;
            color: white;
            margin: 0;
            padding: 15px;
        }
        .container {
            max-width: 420px;
            margin: auto;
            background: #1c1c1c;
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        #status {
            font-size: 15px;
            font-weight: 500;
            color: #ff3b3b;
            letter-spacing: 1px;
        }
        .connect-btn {
            background: #333;
            color: white;
            padding: 10px 28px;
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        canvas {
            margin: 10px auto 20px;
        }
        .digital-box {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 12px 30px;
            margin: 0 auto 25px;
            max-width: 240px;
            box-shadow: inset 0 3px 8px rgba(0,0,0,0.6);
        }
        .eng-label {
            font-size: 13px;
            color: #888;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }
        #digital-rpm {
            font-size: 52px;
            font-weight: 700;
            color: #00ff9d;
            line-height: 1;
            letter-spacing: -2px;
        }
        .section {
            margin-bottom: 28px;
        }
        .label {
            font-size: 13px;
            color: #888;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .baud-row {
            display: flex;
            gap: 10px;
        }
        .baud-btn {
            flex: 1;
            padding: 14px;
            font-size: 17px;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            background: #2f2f2f;
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
        }
        .baud-btn.active {
            background: #00aaff;
            color: white;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.6);
        }
        .addr-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        select, input[type="number"] {
            background: #2f2f2f;
            color: white;
            border: none;
            padding: 12px 16px;
            font-size: 16px;
            border-radius: 50px;
            width: 140px;
            text-align: center;
        }
        .set-btn {
            background: #ffaa00;
            color: #111;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
        .control-row {
            display: flex;
            gap: 12px;
        }
        .control-btn {
            flex: 1;
            padding: 18px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            cursor: pointer;
        }
        .start-btn {
            background: #28a745;
            color: white;
        }
        .stop-btn {
            background: #dc3545;
            color: white;
        }
        .adjust-row {
            display: flex;
            gap: 12px;
        }
        .adjust-btn {
            flex: 1;
            padding: 16px;
            font-size: 17px;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            cursor: pointer;
        }
        .up-btn {
            background: #007bff;
            color: white;
        }
        .down-btn {
            background: #666;
            color: white;
        }
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div id="status">DISCONNECTED</div>
        <button class="connect-btn" onclick="connectBLE()">CONNECT</button>
    </div>

    <canvas id="gauge-rpm"></canvas>

    <div class="digital-box">
        <div class="eng-label">ENGINE RPM</div>
        <div id="digital-rpm">0000</div>
    </div>

    <div class="section">
        <div class="label">BAUD RATE</div>
        <div class="baud-row">
            <button id="baud250" class="baud-btn active" onclick="sendBaud(250)">250K</button>
            <button id="baud500" class="baud-btn" onclick="sendBaud(500)">500K</button>
        </div>
    </div>

    <div class="section">
        <div class="label">ENGINE / SOURCE ADDRESS</div>
        <div class="addr-row">
            <select id="addr-mode">
                <option>Direct Input</option>
            </select>
            <input id="source-addr" type="number" value="229" min="0" max="255">
            <button class="set-btn" onclick="setAddress()">SET</button>
        </div>
    </div>

    <div class="section">
        <div class="label">CONTROL</div>
        <div class="control-row">
            <button class="control-btn start-btn" onclick="sendStart()">START</button>
            <button class="control-btn stop-btn" onclick="sendStop()">STOP</button>
        </div>
    </div>

    <div class="section">
        <div class="label">RPM ADJUST (±25)</div>
        <div class="adjust-row">
            <button class="adjust-btn up-btn" onclick="sendUp()">UP</button>
            <button class="adjust-btn down-btn" onclick="sendDown()">DOWN</button>
        </div>
    </div>
</div>

<script>
    // ==================== 게이지 초기화 (이미지와 최대한 비슷하게) ====================
    var gauge = new RadialGauge({
        renderTo: 'gauge-rpm',
        width: 340,
        height: 340,
        units: "RPM",
        minValue: 0,
        maxValue: 3000,
        majorTicks: ["0", "500", "1000", "1500", "2000", "2500", "3000"],
        minorTicks: 4,
        strokeTicks: true,
        highlights: [{ from: 2500, to: 3000, color: "rgba(255, 60, 60, 0.85)" }],
        colorPlate: "#1a1a1a",
        colorMajorTicks: "#f8f8f8",
        colorMinorTicks: "#aaaaaa",
        colorTitle: "#ccc",
        colorUnits: "#ccc",
        colorNumbers: "#f0f0f0",
        needleType: "arrow",
        needleWidth: 4,
        needleColor: "#e0e0e0",
        animationDuration: 400,
        animationRule: "linear"
    }).draw();

    // ==================== BLE 변수 ====================
    let bleDevice = null;
    let bleCharacteristic = null;
    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

    // ==================== BLE 연결 ====================
    async function connectBLE() {
        try {
            document.getElementById('status').innerText = "Searching...";
            document.getElementById('status').style.color = "#ffcc00";

            bleDevice = await navigator.bluetooth.requestDevice({
                filters: [{ services: [SERVICE_UUID] }]
            });

            const server = await bleDevice.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            bleCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

            await bleCharacteristic.startNotifications();
            bleCharacteristic.addEventListener('characteristicvaluechanged', handleDataChanged);

            document.getElementById('status').innerText = "CONNECTED";
            document.getElementById('status').style.color = "#00ff9d";

            bleDevice.addEventListener('gattserverdisconnected', () => {
                document.getElementById('status').innerText = "DISCONNECTED";
                document.getElementById('status').style.color = "#ff3b3b";
                bleCharacteristic = null;
            });

        } catch (error) {
            console.error(error);
            document.getElementById('status').innerText = "ERROR";
            document.getElementById('status').style.color = "#ff3b3b";
        }
    }

    // ==================== ESP32에서 받은 데이터 처리 ====================
    function handleDataChanged(event) {
        const value = event.target.value;
        if (value.byteLength < 5) return;

        const currentRPM = value.getUint8(0) | (value.getUint8(1) << 8);
        const targetRPM = value.getUint8(2) | (value.getUint8(3) << 8);
        const is500k = value.getUint8(4) === 1;

        // 게이지 + 디지털 업데이트
        gauge.value = currentRPM;
        document.getElementById('digital-rpm').innerText = String(currentRPM).padStart(4, '0');

        // BAUD 버튼 상태 동기화
        updateBaudUI(is500k);
    }

    function updateBaudUI(is500) {
        document.getElementById('baud250').classList.toggle('active', !is500);
        document.getElementById('baud500').classList.toggle('active', is500);
    }

    // ==================== 명령 전송 (ESP32가 기대하는 2바이트 little-endian) ====================
    function sendValue(val) {
        if (!bleCharacteristic) {
            alert("먼저 CONNECT 버튼을 눌러주세요!");
            return;
        }
        const data = new Uint8Array([val & 0xFF, (val >> 8) & 0xFF]);
        bleCharacteristic.writeValue(data).catch(console.error);
    }

    function sendBaud(k) {
        const val = (k === 500) ? 0x5000 : 0x2500;
        sendValue(val);
    }
    function sendStart() { sendValue(1000); }
    function sendStop() { sendValue(600); }
    function sendUp() { sendValue(1); }
    function sendDown() { sendValue(2); }

    function setAddress() {
        const addr = parseInt(document.getElementById('source-addr').value);
        if (isNaN(addr) || addr < 0 || addr > 255) {
            alert("Source Address는 0~255 사이여야 합니다.");
            return;
        }
        const cmd = 0xA500 | addr;   // ESP32가 처리할 특수 명령
        sendValue(cmd);
    }
</script>
</body>
</html>
