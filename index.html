<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J1939 Advanced Control</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 15px; }
        .card { max-width: 420px; margin: auto; background: #2d2d2d; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .status-bar { font-size: 14px; padding: 10px; border-radius: 10px; margin-bottom: 15px; background: #3d3d3d; color: #ffbc00; }
        .connected { color: #00ff88 !important; border: 1px solid #00ff88; }
        
        /* 설정 영역 */
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; padding: 10px; background: #383838; border-radius: 12px; }
        select { width: 100%; padding: 8px; border-radius: 6px; background: #444; color: white; border: 1px solid #555; }
        label { font-size: 11px; color: #aaa; display: block; margin-bottom: 5px; }

        .rpm-display { display: flex; justify-content: space-around; margin: 15px 0; }
        .rpm-box { background: #3d3d3d; padding: 12px; border-radius: 12px; width: 45%; }
        .rpm-val { font-size: 26px; font-weight: bold; color: #00ff88; font-family: monospace; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 16px; font-size: 16px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .btn-conn { grid-column: span 2; background: #4a4a4a; color: white; margin-bottom: 10px; }
        .btn-start { background: #28a745; color: white; }
        .btn-stop { background: #dc3545; color: white; }
        .btn-up { background: #007bff; color: white; }
        .btn-down { background: #6c757d; color: white; }
        button:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body>

<div class="card">
    <h3 style="margin-top:0; color:#eee;">J1939 TRUCK CONTROL</h3>
    <div id="status" class="status-bar">Bluetooth Disconnected</div>

    <div class="settings-grid">
        <div>
            <label>SOURCE ADDRESS</label>
            <select id="sa-select" onchange="sendConfig(0xA2, this.value)">
                <option value="11">0x0B (기본)</option>
                <option value="0">0x00 (엔진)</option>
                <option value="33">0x21 (임시)</option>
                <option value="249">0xF9 (진단)</option>
            </select>
        </div>
        <div>
            <label>BAUDRATE (kbps)</label>
            <select id="baud-select" onchange="sendConfig(0xA1, this.value)">
                <option value="500">500k</option>
                <option value="250">250k</option>
            </select>
        </div>
    </div>

    <canvas id="rpmGauge"></canvas>

    <div class="rpm-display">
        <div class="rpm-box">
            <div id="cur-val" class="rpm-val">0000</div>
            <div style="font-size:10px; color:#aaa;">CURRENT</div>
        </div>
        <div class="rpm-box">
            <div id="tar-val" class="rpm-val">0000</div>
            <div style="font-size:10px; color:#aaa;">TARGET</div>
        </div>
    </div>

    <div class="controls">
        <button id="connBtn" class="btn-conn" onclick="initBLE()">CONNECT SYSTEM</button>
        <button class="btn-start" onclick="sendCmd(0xA3, 1)">START</button>
        <button class="btn-stop" onclick="sendCmd(0xA3, 0)">STOP</button>
        <button class="btn-up" onclick="sendCmd(0xA4, 1)">RPM UP</button>
        <button class="btn-down" onclick="sendCmd(0xA4, 0)">RPM DOWN</button>
    </div>
</div>

<script>
    const UUID_SERVICE = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const UUID_CHAR    = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
    let device, characteristic;

    const gauge = new RadialGauge({
        renderTo: 'rpmGauge', width: 280, height: 280, units: "RPM",
        minValue: 0, maxValue: 3000, majorTicks: ["0","500","1000","1500","2000","2500","3000"],
        highlights: [{"from": 2500, "to": 3000, "color": "red"}],
        colorPlate: "#2d2d2d", colorMajorTicks: "#eee", colorNumbers: "#eee",
        needleType: "arrow", needleWidth: 3, animationDuration: 400, animationRule: "linear"
    }).draw();

    async function initBLE() {
        try {
            const statusEl = document.getElementById('status');
            statusEl.innerText = "Scanning...";
            device = await navigator.bluetooth.requestDevice({ filters: [{ services: [UUID_SERVICE] }] });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(UUID_SERVICE);
            characteristic = await service.getCharacteristic(UUID_CHAR);

            // [핵심] ESP32 데이터 수신 활성화
            await characteristic.startNotifications();
            characteristic.addEventListener('characteristicvaluechanged', (e) => {
                const v = e.target.value;
                // ESP32: currentRPM(2bytes), targetRPM(2bytes) 
                const cur = v.getUint8(0) | (v.getUint8(1) << 8);
                const tar = v.getUint8(2) | (v.getUint8(3) << 8);
                
                document.getElementById('cur-val').innerText = cur.toString().padStart(4, '0');
                document.getElementById('tar-val').innerText = tar.toString().padStart(4, '0');
                gauge.value = cur;
            });

            statusEl.innerText = "System Connected";
            statusEl.classList.add('connected');
            document.getElementById('connBtn').style.display = 'none';
        } catch (err) { console.error(err); document.getElementById('status').innerText = "Retry Connection"; }
    }

    async function sendCmd(type, val) {
        if (!characteristic) return;
        await characteristic.writeValue(new Uint8Array([type, val]));
    }

    async function sendConfig(type, val) {
        if (!characteristic) return;
        const confirmChange = confirm("설정을 변경하시겠습니까? (장치가 재시작될 수 있습니다)");
        if (confirmChange) {
            await characteristic.writeValue(new Uint8Array([type, parseInt(val)]));
        }
    }
</script>
</body>
</html>
