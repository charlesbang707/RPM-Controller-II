<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J1939 Controller</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 8px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 5px; }
        #status { font-size: 14px; color: #ff3b3b; }
        .connect-btn { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; }
        .section { background: #1c1c1c; padding: 10px; border-radius: 15px; }
        .label { font-size: 11px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        .row { display: flex; gap: 8px; margin-bottom: 5px; }
        .btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; color: white; cursor: pointer; font-size: 14px; }
        .baud-btn { background: #2f2f2f; color: #aaa; } .baud-btn.active { background: #00aaff; color: white; }
        .start { background: #28a745; } .stop { background: #dc3545; } .up { background: #007bff; } .down { background: #555; }
        select, input { background: #2f2f2f; color: white; border: none; padding: 8px; border-radius: 5px; font-size: 13px; flex: 1; }
        .set-btn { background: #ffaa00; color: #111; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div id="status">DISCONNECTED</div>
        <button class="connect-btn" onclick="connect()">CONNECT</button>
    </div>

    <canvas id="gauge-rpm"></canvas>

    <div class="section">
        <div class="label">BAUD RATE</div>
        <div class="row">
            <button id="b250" class="btn baud-btn active" onclick="send(0x2500)">250K</button>
            <button id="b500" class="btn baud-btn" onclick="send(0x5000)">500K</button>
        </div>
    </div>

    <div class="section">
        <div class="label">ENGINE / SOURCE ADDRESS</div>
        <div class="row">
            <select id="mfg-select" onchange="updateSA(this.value)">
                <option value="229">Direct Input</option>
                <option value="0">Engine #1 (0x00)</option>
                <option value="1">Engine #2 (0x01)</option>
                <option value="3">Transmission (0x03)</option>
                <option value="33">Body Controller (0x21)</option>
                <option value="232">Caterpillar (0xE8)</option>
                <option value="247">Cummins (0xF7)</option>
            </select>
            <input id="sa-val" type="number" value="229" min="0" max="255">
            <button class="set-btn" onclick="setSA()">SET</button>
        </div>
    </div>

    <div class="section">
        <div class="label">CONTROL</div>
        <div class="row">
            <button class="btn start" onclick="send(1000)">START</button>
            <button class="btn stop" onclick="send(600)">STOP</button>
        </div>
        <div class="row">
            <button class="btn up" onclick="send(1)">RPM UP</button>
            <button class="btn down" onclick="send(2)">RPM DOWN</button>
        </div>
    </div>
</div>

<script>
    const gauge = new RadialGauge({
        renderTo: 'gauge-rpm', width: 320, height: 320, minValue: 0, maxValue: 3000,
        majorTicks: ["0","500","1000","1500","2000","2500","3000"],
        colorPlate: "#0f0f0f", colorNumbers: "#fff", needleType: "arrow",
        needleWidth: 3, valueBox: true, valueDec: 0,
        // 지시사항: 가장 바깥쪽 크기에 맞춰 Target 아크 표현
        barWidth: 10, colorBar: "#222", colorBarProgress: "#00ff9d",
        highlights: [{ from: 2500, to: 3000, color: "rgba(255,0,0,0.5)" }],
        animationDuration: 200
    }).draw();

    let char;
    async function connect() {
        const dev = await navigator.bluetooth.requestDevice({ filters: [{ services: ["4fafc201-1fb5-459e-8fcc-c5c9c331914b"] }] });
        const server = await dev.gatt.connect();
        const service = await server.getPrimaryService("4fafc201-1fb5-459e-8fcc-c5c9c331914b");
        char = await service.getCharacteristic("beb5483e-36e1-4688-b7f5-ea07361b26a8");
        await char.startNotifications();
        char.addEventListener('characteristicvaluechanged', (e) => {
            const v = e.target.value;
            const cur = v.getUint16(0, true);
            const tar = v.getUint16(2, true);
            const is500 = v.getUint8(4) === 1;
            // 바늘과 숫자는 Current RPM
            gauge.value = cur;
            // 아크(Progress Bar)는 Target RPM
            gauge.update({ barProgress: tar });
            document.getElementById('b500').className = is500 ? "btn baud-btn active" : "btn baud-btn";
            document.getElementById('b250').className = is500 ? "btn baud-btn" : "btn baud-btn active";
            document.getElementById('status').innerText = "CONNECTED";
            document.getElementById('status').style.color = "#00ff9d";
        });
    }

    async function send(v) { if(char) await char.writeValue(new Uint16Array([v])); }
    function updateSA(v) { document.getElementById('sa-val').value = v; }
    function setSA() { const sa = parseInt(document.getElementById('sa-val').value); send(0xA500 | sa); }
</script>
</body>
</html>
