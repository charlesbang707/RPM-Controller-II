<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J1939 Master Control</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Roboto', sans-serif; margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 8px; }
        
        /* 상단 상태바 */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
        #status { font-size: 14px; font-weight: bold; color: #ff4757; }
        .conn-btn { background: #333; color: #fff; border: none; padding: 6px 12px; border-radius: 15px; font-size: 11px; cursor: pointer; }

        /* 2, 3. 게이지 및 디지털 숫자 (사용자 디자인 유지) */
        #gauge-area { position: relative; width: 340px; height: 340px; margin: 0 auto; }
        #target-num { position: absolute; bottom: 75px; left: 50%; transform: translateX(-50%); font-size: 52px; font-weight: 800; color: #00ff9d; font-family: monospace; text-shadow: 0 0 10px rgba(0,255,157,0.3); }

        .section { background: #1c1c1c; padding: 10px; border-radius: 15px; width: 100%; box-sizing: border-box; }
        .label { font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .row { display: flex; gap: 6px; margin-bottom: 5px; }
        
        /* 6, 7. 제어 버튼 */
        .btn { flex: 1; padding: 14px; border-radius: 10px; border: none; font-weight: bold; font-size: 15px; cursor: pointer; color: white; }
        .resume { background: #27ae60; } .stop { background: #c0392b; }
        .up { background: #2980b9; } .down { background: #7f8c8d; }
        
        /* 4. Baud Rate */
        .baud { background: #333; color: #666; font-size: 13px; padding: 10px; } 
        .baud.active { background: #0984e3; color: white; }

        /* 5. Source Address */
        select, input { background: #2a2a2a; color: white; border: none; padding: 8px; border-radius: 6px; flex: 1; font-size: 13px; }
        .set-btn { background: #f39c12; color: black; font-weight: bold; padding: 0 12px; border-radius: 6px; border: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div id="status">● DISCONNECTED</div>
        <button class="conn-btn" onclick="connect()">CONNECT BLE</button>
    </div>

    <div id="gauge-area">
        <canvas id="gauge-rpm"></canvas>
        <div id="target-num">0000</div>
    </div>

    <div class="section">
        <div class="label">Source Address</div>
        <div class="row">
            <select id="sa-preset" onchange="document.getElementById('sa-input').value = this.value">
                <option value="229">Default (0xE5)</option>
                <option value="232">Caterpillar (0xE8)</option>
                <option value="247">Cummins (0xF7)</option>
                <option value="0">Engine #1 (0x00)</option>
                <option value="33">Body Control (0x21)</option>
            </select>
            <input id="sa-input" type="number" value="229">
            <button class="set-btn" onclick="setSA()">SET</button>
        </div>
    </div>

    <div class="section">
        <div class="row">
            <button id="b250" class="btn baud active" onclick="sendBaud(250)">250K</button>
            <button id="b500" class="btn baud" onclick="sendBaud(500)">500K</button>
            <button class="btn resume" style="flex:2" onclick="send(1000)">RESUME</button>
            <button class="btn stop" style="flex:2" onclick="send(600)">STOP</button>
        </div>
        <div class="row">
            <button class="btn up" onclick="send(1)">RPM UP ▲</button>
            <button class="btn down" onclick="send(2)">RPM DOWN ▼</button>
        </div>
    </div>
</div>

<script>
    // 사용자님이 준 이미지의 게이지 모양 그대로 설정
    const gauge = new RadialGauge({
        renderTo: 'gauge-rpm', width: 340, height: 340, minValue: 0, maxValue: 3000,
        majorTicks: ["0","500","1000","1500","2000","2500","3000"],
        colorPlate: "#0f0f0f", colorNumbers: "#fff", needleType: "arrow",
        needleWidth: 3, needleColor: "#fff",
        barWidth: 15, colorBar: "rgba(255,255,255,0.05)", colorBarProgress: "#00ff9d",
        valueBox: false, borders: false, animationDuration: 150, animationRule: "linear"
    }).draw();

    let bleChar;
    async function connect() {
        const dev = await navigator.bluetooth.requestDevice({ filters: [{ services: ["4fafc201-1fb5-459e-8fcc-c5c9c331914b"] }] });
        const server = await dev.gatt.connect();
        const service = await server.getPrimaryService("4fafc201-1fb5-459e-8fcc-c5c9c331914b");
        bleChar = await service.getCharacteristic("beb5483e-36e1-4688-b7f5-ea07361b26a8");
        await bleChar.startNotifications();
        bleChar.addEventListener('characteristicvaluechanged', (e) => {
            const v = e.target.value;
            const cur = v.getUint16(0, true);
            const tar = v.getUint16(2, true);
            const is500 = v.getUint8(4) === 1;
            
            gauge.value = cur; // 바늘 -> Current
            gauge.update({ barProgress: tar }); // 아크 -> Target
            document.getElementById('target-num').innerText = tar;
            
            document.getElementById('status').innerText = "● CONNECTED";
            document.getElementById('status').style.color = "#00ff9d";
            document.getElementById('b500').className = is500 ? "btn baud active" : "btn baud";
            document.getElementById('b250').className = is500 ? "btn baud" : "btn baud active";
        });
    }

    async function send(v) { if(bleChar) await bleChar.writeValue(new Uint16Array([v])); }
    function sendBaud(k) { send(k === 500 ? 0x5000 : 0x2500); }
    function setSA() { const sa = parseInt(document.getElementById('sa-input').value); send(0xA500 | sa); }
</script>
</body>
</html>
