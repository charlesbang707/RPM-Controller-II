<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J1939 Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .top-bar { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-connect { background: #333; color: white; border: 1px solid #444; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-connect.connected { background: #e74c3c; }
        .gauge-wrapper { position: relative; margin-bottom: 20px; }
        #targetVal { position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%); font-size: 30px; color: #3498db; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 400px; }
        .btn { padding: 25px; border-radius: 12px; font-size: 20px; font-weight: bold; color: white; border: none; cursor: pointer; }
        .resume { background: #2ecc71; } .up { background: #3498db; } .stop { background: #e74c3c; } .down { background: #f39c12; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div id="status" style="color:#888;">READY</div>
        <button id="connectBtn" class="btn-connect" onclick="toggleConnection()">CONNECT</button>
    </div>

    <div class="gauge-wrapper">
        <canvas id="gauge-rpm"></canvas>
        <div id="targetVal">0</div>
    </div>

    <div class="grid">
        <button class="btn resume" onclick="sendCmd(1000)">RESUME</button>
        <button class="btn up" onclick="sendCmd(1)">UP ▲</button>
        <button class="btn stop" onclick="sendCmd(600)">STOP</button>
        <button class="btn down" onclick="sendCmd(2)">DOWN ▼</button>
    </div>

    <script>
        let device, characteristic;
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        const gauge = new RadialGauge({
            renderTo: 'gauge-rpm', width: 350, height: 350, minValue: 0, maxValue: 3000,
            colorPlate: "#1a1a1a", colorBorderOuter: "#333", needleType: "arrow",
            majorTicks: ["0","500","1000","1500","2000","2500","3000"],
            valueBox: false, animationDuration: 150
        }).draw();

        async function toggleConnection() {
            if (device && device.gatt.connected) { await device.gatt.disconnect(); return; }
            try {
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: "Truck_RPM_Control" }], optionalServices: [SERVICE_UUID]
                });
                device.addEventListener('gattserverdisconnected', () => updateUI(false));
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHAR_UUID);
                updateUI(true);
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (e) => {
                    const data = e.target.value;
                    gauge.value = data.getUint16(0, true);
                    document.getElementById('targetVal').innerText = data.getUint16(2, true);
                });
            } catch (err) { console.log(err); }
        }

        function updateUI(connected) {
            document.getElementById('status').innerText = connected ? "CONNECTED" : "READY";
            document.getElementById('status').style.color = connected ? "#2ecc71" : "#888";
            document.getElementById('connectBtn').innerText = connected ? "DISCONNECT" : "CONNECT";
            document.getElementById('connectBtn').classList.toggle('connected', connected);
        }

        async function sendCmd(val) { if (characteristic) await characteristic.writeValue(new Uint16Array([val])); }
    </script>
</body>
</html>
