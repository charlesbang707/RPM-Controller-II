<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Truck RPM Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { 
            background-color: #1a1a1a; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            min-height: 95vh; padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        .top-bar { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #status { font-size: 14px; color: #888; font-weight: bold; }
        .btn-connect { 
            background: linear-gradient(to bottom, #444, #222); color: #ccc; border: 1px solid #555;
            padding: 8px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: 0.3s;
        }
        .btn-connect.connected { background: linear-gradient(to bottom, #2ecc71, #27ae60); color: white; border: none; }
        
        .gauge-container { position: relative; width: 300px; height: 300px; margin: 20px 0; }
        .rpm-display { position: absolute; bottom: 65px; width: 100%; font-size: 40px; font-weight: 800; color: #efefef; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .rpm-unit { position: absolute; bottom: 50px; width: 100%; font-size: 12px; color: #888; }

        .control-panel { width: 100%; max-width: 400px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 25px; backdrop-filter: blur(10px); }
        .control-group { margin-bottom: 20px; }
        .label { font-size: 11px; color: #aaa; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { 
            padding: 15px; font-size: 16px; font-weight: bold; border: none; border-radius: 12px;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(145deg, #333, #222); color: #999;
            box-shadow: 5px 5px 10px #111, -2px -2px 5px #444;
        }
        button:active { transform: scale(0.95); box-shadow: inset 2px 2px 5px #111; }
        button.active { background: linear-gradient(145deg, #3498db, #2980b9); color: white; box-shadow: 0 0 15px rgba(52, 152, 219, 0.5); }
        
        .btn-action { background: linear-gradient(145deg, #e67e22, #d35400); color: white; width: 100%; margin-top: 10px; }
        
        /* SA Selection Styles */
        .sa-ui { display: flex; gap: 8px; justify-content: center; align-items: center; }
        select, input[type="number"] { 
            background: #2a2a2a; color: white; border: 1px solid #444; padding: 10px; border-radius: 8px; font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div id="status">DISCONNECTED</div>
        <button id="connectBtn" class="btn-connect" onclick="toggleConnect()">CONNECT</button>
    </div>

    <div class="gauge-container">
        <canvas id="rpmGauge"></canvas>
        <div class="rpm-display" id="rpmVal">0</div>
        <div class="rpm-unit">ENGINE RPM</div>
    </div>

    <div class="control-panel">
        <div class="control-group">
            <div class="label">Baud Rate</div>
            <div class="btn-grid">
                <button id="btn250" onclick="sendBaud(250)">250K</button>
                <button id="btn500" onclick="sendBaud(500)">500K</button>
            </div>
        </div>

        <div class="control-group">
            <div class="label">Engine / Source Address</div>
            <div class="sa-ui">
                <select id="saSelect" onchange="onSASelectChange()">
                    <option value="3">Detroit/Hino (3)</option>
                    <option value="7">Cummins/Paccar PX (7)</option>
                    <option value="11">Mack/Volvo/MX (11)</option>
                    <option value="42">Old Mack (42)</option>
                    <option value="custom">Direct Input</option>
                </select>
                <input type="number" id="customSA" value="11" min="0" max="253" style="width: 50px; display: none;">
                <button onclick="applySA()" style="padding: 10px; font-size: 12px; background: #f39c12; color: white; box-shadow: none;">SET</button>
            </div>
        </div>

        <div class="control-group">
            <div class="label">Control</div>
            <div class="btn-grid">
                <button id="btnStart" onclick="sendAction('START')">START</button>
                <button id="btnStop" onclick="sendAction('STOP')" style="background: linear-gradient(145deg, #c0392b, #a93226); color: white;">STOP</button>
            </div>
        </div>
    </div>

    <script>
        const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const CHAR_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
        
        let device, server, characteristic;

        const gauge = new RadialGauge({
            renderTo: 'rpmGauge', width: 300, height: 300, units: "", minValue: 0, maxValue: 3000,
            majorTicks: ["0","500","1000","1500","2000","2500","3000"],
            minorTicks: 5, strokeTicks: true,
            highlights: [{ from: 2200, to: 3000, color: 'rgba(200, 50, 50, .75)' }],
            colorPlate: "transparent", colorMajorTicks: "#ddd", colorMinorTicks: "#666",
            colorNumbers: "#eee", colorNeedle: "rgba(240, 128, 128, 1)",
            needleType: "arrow", needleWidth: 3, animationDuration: 1500, animationRule: "linear"
        }).draw();

        async function toggleConnect() {
            if (device) {
                await device.gatt.disconnect();
                return;
            }
            try {
                device = await navigator.bluetooth.requestDevice({ filters: [{ services: [SERVICE_UUID] }] });
                device.addEventListener('gattserverdisconnected', onDisconnected);
                server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHAR_UUID);
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', handleData);
                
                document.getElementById('status').innerText = "CONNECTED";
                document.getElementById('connectBtn').innerText = "DISCONNECT";
                document.getElementById('connectBtn').classList.add('connected');
            } catch (e) { console.error(e); }
        }

        function onDisconnected() {
            device = null;
            document.getElementById('status').innerText = "DISCONNECTED";
            document.getElementById('connectBtn').innerText = "CONNECT";
            document.getElementById('connectBtn').classList.remove('connected');
        }

        function handleData(e) {
            let data = e.target.value;
            if (data.byteLength >= 4) {
                let current = data.getUint16(0, true);
                gauge.value = current;
                document.getElementById('rpmVal').innerText = current;
            }
        }

        // 명령 전송 통합 (0xA1: Baud, 0xA2: SA, 0xA3: Action)
        async function sendPacket(type, val) {
            if (!characteristic) return;
            const data = new Uint8Array([type, val]);
            await characteristic.writeValue(data);
        }

        function sendBaud(val) {
            sendPacket(0xA1, val === 250 ? 250 : 500);
            document.getElementById('btn250').classList.toggle('active', val === 250);
            document.getElementById('btn500').classList.toggle('active', val === 500);
        }

        function onSASelectChange() {
            const select = document.getElementById('saSelect');
            const input = document.getElementById('customSA');
            input.style.display = (select.value === 'custom') ? 'block' : 'none';
            if (select.value !== 'custom') input.value = select.value;
        }

        function applySA() {
            const sa = parseInt(document.getElementById('customSA').value);
            if (sa >= 0 && sa <= 253) {
                sendPacket(0xA2, sa);
                alert("Source Address " + sa + " Applied.");
            }
        }

        function sendAction(action) {
            // 1: Start, 0: Stop
            sendPacket(0xA3, action === 'START' ? 1 : 0);
        }
    </script>
</body>
</html>
