<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPM Control Center</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        
        /* 게이지 중앙 정렬 및 크기 극대화 */
        #gauge-container { position: relative; width: 380px; height: 380px; display: flex; justify-content: center; align-items: center; }
        
        .section { width: 90%; background: #1a1a1a; padding: 12px; border-radius: 15px; margin-top: 5px; }
        .row { display: flex; gap: 10px; margin-bottom: 8px; }
        .btn { flex: 1; padding: 18px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; color: white; }
        .resume { background: #2ecc71; } .stop { background: #e74c3c; } .up { background: #3498db; } .down { background: #7f8c8d; }
        
        /* Target RPM 숫자 박스 커스텀 (바늘 밑 숫자) */
        #target-display { position: absolute; bottom: 85px; font-size: 45px; font-weight: bold; color: #00ff9d; text-shadow: 0 0 10px rgba(0,255,157,0.5); }
        .label { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 5px; text-align: left; }
    </style>
</head>
<body>
<div class="container">
    <div id="status" style="font-size: 12px; color: #555;">DISCONNECTED</div>
    <button onclick="connect()" style="background:#333; color:white; border:none; padding:8px 20px; border-radius:20px; margin-bottom:10px;">CONNECT</button>

    <div id="gauge-container">
        <canvas id="gauge-rpm"></canvas>
        <div id="target-display">0</div>
    </div>

    <div class="section">
        <div class="label">ENGINE CONTROL</div>
        <div class="row">
            <button class="btn resume" onclick="send(1000)">RESUME</button>
            <button class="btn stop" onclick="send(600)">STOP</button>
        </div>
        <div class="row">
            <button class="btn up" onclick="send(1)">RPM UP</button>
            <button class="btn down" onclick="send(2)">RPM DOWN</button>
        </div>
    </div>
</div>

<script>
    const gauge = new RadialGauge({
        renderTo: 'gauge-rpm',
        width: 380, height: 380, // 요청하신 대로 크기 확대
        minValue: 0, maxValue: 3000,
        majorTicks: ["0","500","1000","1500","2000","2500","3000"],
        colorPlate: "#0a0a0a", colorNumbers: "#fff",
        needleType: "arrow", needleWidth: 4, needleColor: "#fff",
        // 테두리 아크 설정 (Target RPM 표시용)
        barWidth: 12, colorBar: "#1a1a1a", colorBarProgress: "#00ff9d",
        valueBox: false, // 기본 숫자 박스는 숨기고 커스텀 div 사용
        highlights: [{ from: 2500, to: 3000, color: "rgba(255,0,0,0.3)" }],
        animationDuration: 100, animationRule: "linear"
    }).draw();

    let char;
    async function connect() {
        const dev = await navigator.bluetooth.requestDevice({ filters: [{ services: ["4fafc201-1fb5-459e-8fcc-c5c9c331914b"] }] });
        const server = await dev.gatt.connect();
        const service = await server.getPrimaryService("4fafc201-1fb5-459e-8fcc-c5c9c331914b");
        char = await service.getCharacteristic("beb5483e-36e1-4688-b7f5-ea07361b26a8");
        await char.startNotifications();
        char.addEventListener('characteristicvaluechanged', (e) => {
            const v = e.target.value;
            const cur = v.getUint16(0, true);
            const tar = v.getUint16(2, true);
            
            // 1. 아날로그 바늘 -> Current RPM
            gauge.value = cur;
            // 2. 테두리 아크 -> Target RPM
            gauge.update({ barProgress: tar });
            // 3. 바늘 밑 숫자 -> Target RPM
            document.getElementById('target-display').innerText = tar;
            
            document.getElementById('status').innerText = "CONNECTED";
        });
    }

    async function send(v) { if(char) await char.writeValue(new Uint16Array([v])); }
</script>
</body>
</html>
