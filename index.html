<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J1939 Dash</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        .top-bar { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #status { font-weight: bold; color: #e74c3c; }
        .btn-connect { background: #333; color: white; border: 1px solid #444; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .btn-connect.connected { background: #e74c3c; }

        .gauge-container { position: relative; margin-bottom: 20px; }
        #targetVal { position: absolute; bottom: 65px; left: 50%; transform: translateX(-50%); font-size: 28px; color: #3498db; font-weight: bold; }

        .control-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 400px; }
        .btn { padding: 25px; border-radius: 12px; font-size: 20px; font-weight: bold; color: white; border: none; cursor: pointer; }
        .resume { background: #2ecc71; } .stop { background: #e74c3c; } .up { background: #3498db; } .down { background: #f39c12; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div id="status">DISCONNECTED</div>
        <button id="connectBtn" class="btn-connect" onclick="toggleConn()">CONNECT</button>
    </div>

    <div class="gauge-container">
        <canvas id="rpmGauge"></canvas>
        <div id="targetVal">0</div>
    </div>

    <div class="control-panel">
        <button class="btn resume" onclick="send(1000)">RESUME</button>
        <button class="btn up" onclick="send(1)">UP ▲</button>
        <button class="btn stop" onclick="send(600)">STOP</button>
        <button class="btn down" onclick="send(2)">DOWN ▼</button>
    </div>

    <script>
        let device, characteristic;
        const S_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const C_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        const gauge = new RadialGauge({
            renderTo: 'rpmGauge', width: 350, height: 350, minValue: 0, maxValue: 3000,
            majorTicks: ["0","500","1000","1500","2000","2500","3000"],
            colorPlate: "#1a1a1a", colorBorderOuter: "#333", needleType: "arrow",
            valueBox: true, colorValueBoxBackground: "#222", colorValueText: "#fff"
        }).draw();

        async function toggleConn() {
            if (device && device.gatt.connected) { await device.gatt.disconnect(); return; }
            try {
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: "Truck_RPM_Control" }], optionalServices: [S_UUID]
                });
                device.addEventListener('gattserverdisconnected', () => updateUI(false));
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(S_UUID);
                characteristic = await service.getCharacteristic(C_UUID);
                updateUI(true);
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', e => {
                    const d = e.target.value;
                    gauge.value = d.getUint16(0, true);
                    document.getElementById('targetVal').innerText = d.getUint16(2, true);
                });
            } catch (e) { console.log(e); }
        }

        function updateUI(c) {
            document.getElementById('status').innerText = c ? "CONNECTED" : "DISCONNECTED";
            document.getElementById('status').style.color = c ? "#2ecc71" : "#e74c3c";
            document.getElementById('connectBtn').innerText = c ? "DISCONNECT" : "CONNECT";
        }

        async function send(v) { if(characteristic) await characteristic.writeValue(new Uint16Array([v])); }
    </script>
</body>
</html>
