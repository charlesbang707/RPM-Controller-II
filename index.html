<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J1939 RPM Control</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 15px; }
        .card { max-width: 420px; margin: auto; background: #2d2d2d; padding: 20px; border-radius: 20px; }
        .status-bar { font-size: 14px; padding: 10px; border-radius: 10px; margin-bottom: 15px; background: #3d3d3d; color: #ffbc00; }
        .connected { color: #00ff88 !important; border: 1px solid #00ff88; }
        .val-container { display: flex; gap: 10px; margin: 15px 0; }
        .val-box { flex: 1; background: #333; padding: 12px; border-radius: 10px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 18px; font-size: 16px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; }
        .btn-conn { background: #007bff; color: white; width: 100%; margin-bottom: 10px; }
        .btn-disc { background: #dc3545; color: white; width: 100%; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>
<div class="card">
    <div id="status" class="status-bar">Disconnected</div>
    <button id="connBtn" class="btn-conn" onclick="initBLE()">CONNECT SYSTEM</button>
    <button id="discBtn" class="btn-disc" onclick="disconnect()">DISCONNECT</button>
    
    <canvas id="gauge"></canvas>
    
    <div class="val-container">
        <div class="val-box"><div id="cur" style="color:#00ff88; font-size:24px;">0</div><small>CURRENT</small></div>
        <div class="val-box"><div id="tar" style="color:#ffbc00; font-size:24px;">0</div><small>TARGET</small></div>
    </div>

    <div class="controls">
        <button style="background:#28a745; color:white;" onclick="send(0xA3, 1)">START</button>
        <button style="background:#dc3545; color:white;" onclick="send(0xA3, 0)">STOP</button>
        <button style="background:#007bff; color:white;" onclick="send(0xA4, 1)">UP</button>
        <button style="background:#6c757d; color:white;" onclick="send(0xA4, 0)">DOWN</button>
    </div>
</div>

<script>
    const S_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const C_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
    let dev, char;

    const gauge = new RadialGauge({
        renderTo: 'gauge', width: 300, height: 300, units: "RPM", minValue: 0, maxValue: 3000,
        majorTicks: ["0","500","1000","1500","2000","2500","3000"],
        colorPlate: "#2d2d2d", colorMajorTicks: "#eee", colorNumbers: "#eee", animation: true
    }).draw();

    async function initBLE() {
        try {
            dev = await navigator.bluetooth.requestDevice({ filters: [{ services: [S_UUID] }] });
            const server = await dev.gatt.connect();
            const service = await server.getPrimaryService(S_UUID);
            char = await service.getCharacteristic(C_UUID);
            await char.startNotifications();
            char.oncharacteristicvaluechanged = (e) => {
                const v = e.target.value;
                const cur = v.getUint8(0) | (v.getUint8(1) << 8);
                const tar = v.getUint8(2) | (v.getUint8(3) << 8);
                gauge.value = cur;
                document.getElementById('cur').innerText = cur;
                document.getElementById('tar').innerText = tar;
            };
            document.getElementById('status').innerText = "Connected";
            document.getElementById('status').className = "status-bar connected";
            document.getElementById('connBtn').style.display = 'none';
            document.getElementById('discBtn').style.display = 'block';
        } catch (e) { console.log(e); }
    }

    function disconnect() { if(dev) { dev.gatt.disconnect(); location.reload(); } }
    async function send(t, v) { if(char) await char.writeValue(new Uint8Array([t, v])); }
</script>
</body>
</html>
