<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Truck RPM Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 380px; margin: auto; }
        .btn { padding: 20px; border-radius: 12px; font-weight: bold; border: none; cursor: pointer; color: white; box-shadow: 0 6px 0 rgba(0,0,0,0.5); }
        .resume { background: #2ecc71; } .up { background: #3498db; } .stop { background: #e74c3c; } .down { background: #f39c12; }
        .active { color: #3498db; border: 1px solid #3498db; }
    </style>
</head>
<body>
    <button id="connectBtn" style="padding:10px 20px; border-radius:8px;" onclick="toggleConnection()">CONNECT</button>
    <div id="status" style="margin:10px; color:#888;">Ready</div>
    <canvas id="gauge-rpm"></canvas>
    <h1 id="rpmVal">0</h1>
    <div style="margin:20px;">
        <button id="btn250" class="active" onclick="sendCmd(0x2500)">250k</button>
        <button id="btn500" onclick="sendCmd(0x5000)">500k</button>
    </div>
    <div class="grid">
        <button class="btn resume" onclick="sendCmd(1000)">RESUME</button>
        <button class="btn up" onclick="sendCmd(1)">UP</button>
        <button class="btn stop" onclick="sendCmd(600)">STOP</button>
        <button class="btn down" onclick="sendCmd(2)">DOWN</button>
    </div>

    <script>
        let device, characteristic;
        const S_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const C_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        const gauge = new RadialGauge({
            renderTo: 'gauge-rpm', width: 280, height: 280, minValue: 0, maxValue: 3000,
            majorTicks: ["0","500","1000","1500","2000","2500","3000"],
            colorPlate: "#1a1a1a", colorNumbers: "#fff", needleType: "arrow",
            highlights: [], highlightsWidth: 12, valueBox: false, animationDuration: 150
        }).draw();

        async function toggleConnection() {
            try {
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: "Truck_RPM_Control" }],
                    optionalServices: [S_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(S_UUID);
                characteristic = await service.getCharacteristic(C_UUID);
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (e) => {
                    const v = e.target.value;
                    const cur = v.getUint16(0, true);
                    const tar = v.getUint16(2, true);
                    gauge.value = cur;
                    document.getElementById('rpmVal').innerText = cur;
                    
                    // [기능 추가] Target RPM에 따른 테두리 아크 표시
                    if (tar > 0) {
                        const col = tar > 1800 ? "rgba(231, 76, 60, 0.7)" : "rgba(255, 204, 0, 0.5)";
                        gauge.update({ highlights: [{ from: 0, to: tar, color: col }] });
                    } else { gauge.update({ highlights: [] }); }
                });
                document.getElementById('status').innerText = "Connected";
            } catch (err) { console.error(err); }
        }

        async function sendCmd(val) {
            if (characteristic) {
                await characteristic.writeValue(new Uint16Array([val]));
                if(val === 0x2500 || val === 0x5000) {
                    document.getElementById('btn250').className = (val === 0x2500 ? "active" : "");
                    document.getElementById('btn500').className = (val === 0x5000 ? "active" : "");
                }
            }
        }
    </script>
</body>
</html>
