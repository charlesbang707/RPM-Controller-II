<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Truck RPM Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { 
            background-color: #121212; color: white; font-family: sans-serif; 
            text-align: center; margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }
        .top-bar { width: 100%; max-width: 400px; display: flex; justify-content: space-between; margin-bottom: 10px; }
        .btn-connect { 
            background: #333; color: white; border: 1px solid #444; padding: 10px 15px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #000;
        }
        .btn-connect.connected { background: #e74c3c; }

        /* 게이지 래퍼: 내부 숫자를 위해 relative 설정 */
        .gauge-wrapper { position: relative; width: 300px; height: 300px; margin: 10px 0; }
        
        /* 게이지 안쪽 Target RPM 숫자 스타일 */
        #targetDisplay {
            position: absolute; top: 65%; left: 50%; transform: translate(-50%, -50%);
            font-size: 24px; font-weight: bold; color: #3498db; text-shadow: 0 0 10px rgba(52,152,219,0.5);
            pointer-events: none; z-index: 10;
        }
        
        /* 아날로그 게이지 하단 메인 Current RPM 숫자 */
        #rpmVal { font-size: 50px; font-weight: bold; margin-top: -30px; margin-bottom: 20px; }

        .sa-container { width: 100%; max-width: 380px; display: flex; gap: 5px; margin-bottom: 15px; }
        .sa-select { flex: 1; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; padding: 5px; }
        
        .baud-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-baud { background: #222; color: #888; border: 1px solid #444; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .btn-baud.active { border-color: #3498db; color: #3498db; box-shadow: 0 0 10px rgba(52,152,219,0.3); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 380px; }
        .btn { padding: 20px; border-radius: 10px; font-size: 18px; font-weight: bold; color: white; border: none; cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.5); }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.5); }
        .resume { background: #2ecc71; } .up { background: #3498db; } .stop { background: #e74c3c; } .down { background: #f39c12; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div id="status" style="color:#888">Disconnected</div>
        <button id="connectBtn" class="btn-connect" onclick="toggleConnection()">CONNECT</button>
    </div>

    <div class="sa-container">
        <select id="saSelect" class="sa-select">
            <option value="229">Default (0xE5)</option>
            <option value="232">Caterpillar (0xE8)</option>
            <option value="247">Cummins (0xF7)</option>
        </select>
        <button style="background:#f1c40f; border:none; border-radius:5px; padding:0 15px; font-weight:bold" onclick="setSA()">SET</button>
    </div>

    <div class="gauge-wrapper">
        <canvas id="gauge-rpm"></canvas>
        <div id="targetDisplay">0</div>
    </div>
    
    <div id="rpmVal">0000</div>
    <div style="font-size:12px; color:#666; margin-top:-15px; margin-bottom:15px">CURRENT RPM</div>

    <div class="baud-container">
        <button id="btn250" class="btn-baud active" onclick="changeBaud(250)">250 kbps</button>
        <button id="btn500" class="btn-baud" onclick="changeBaud(500)">500 kbps</button>
    </div>

    <div class="grid">
        <button class="btn resume" onclick="sendCmd(1000)">RESUME</button>
        <button class="btn up" onclick="sendCmd(1)">UP</button>
        <button class="btn stop" onclick="sendCmd(600)">STOP</button>
        <button class="btn down" onclick="sendCmd(2)">DOWN</button>
    </div>

    <script>
        let device, characteristic;
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        var gauge = new RadialGauge({
            renderTo: 'gauge-rpm', width: 300, height: 300,
            minValue: 0, maxValue: 3000,
            majorTicks: ["0","500","1000","1500","2000","2500","3000"],
            colorPlate: "#121212", colorMajorTicks: "#444", colorNumbers: "#eee",
            needleType: "arrow", needleWidth: 3, borders: false, valueBox: false,
            animationDuration: 100
        }).draw();

        async function toggleConnection() {
            if (device && device.gatt.connected) { device.gatt.disconnect(); return; }
            try {
                device = await navigator.bluetooth.requestDevice({ filters: [{ name: "Truck_RPM_Control" }], optionalServices: [SERVICE_UUID] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHAR_UUID);
                
                document.getElementById('status').innerText = "Connected";
                document.getElementById('connectBtn').innerText = "DISCONNECT";
                document.getElementById('connectBtn').classList.add('connected');

                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (e) => {
                    let data = e.target.value;
                    let cur = data.getUint16(0, true);
                    let tar = data.getUint16(2, true);
                    let baud = data.getUint8(4);
                    
                    gauge.value = cur;
                    document.getElementById('rpmVal').innerText = cur.toString().padStart(4, '0');
                    document.getElementById('targetDisplay').innerText = tar; // 게이지 안쪽 숫자 업데이트
                    
                    document.getElementById('btn250').classList.toggle('active', baud === 0);
                    document.getElementById('btn500').classList.toggle('active', baud === 1);
                });
            } catch (err) { console.log(err); }
        }

        async function sendCmd(val) {
            if (characteristic) await characteristic.writeValue(new Uint16Array([val]));
        }

        async function changeBaud(baud) {
            let val = (baud === 500) ? 0x5000 : 0x2500;
            if (characteristic) await characteristic.writeValue(new Uint16Array([val]));
        }

        async function setSA() {
            const sa = parseInt(document.getElementById('saSelect').value);
            if (characteristic) await characteristic.writeValue(new Uint16Array([0xA500 | sa]));
        }
    </script>
</body>
</html>
