<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J1939 Master Control</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { width: 100%; max-width: 390px; display: flex; flex-direction: column; gap: 8px; }
        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        #status { font-size: 13px; font-weight: bold; color: #ff4757; }
        .conn-btn { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; }

        /* 게이지 확대 및 중앙 정렬 */
        #gauge-box { position: relative; width: 370px; height: 370px; display: flex; justify-content: center; align-items: center; }
        #target-num { position: absolute; bottom: 80px; font-size: 55px; font-weight: 800; color: #00ff9d; font-family: monospace; text-shadow: 0 0 15px rgba(0,255,157,0.4); }

        .section { background: #1a1a1a; padding: 12px; border-radius: 18px; width: 100%; box-sizing: border-box; }
        .label { font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
        .row { display: flex; gap: 8px; margin-bottom: 8px; }
        
        .btn { flex: 1; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 15px; cursor: pointer; color: white; }
        .resume { background: #27ae60; } .stop { background: #c0392b; }
        .up { background: #2980b9; } .down { background: #7f8c8d; }
        .baud { background: #333; color: #666; } .baud.active { background: #0984e3; color: white; }

        select, input { background: #2a2a2a; color: white; border: none; padding: 10px; border-radius: 8px; flex: 1; font-size: 14px; }
        .set-btn { background: #f39c12; color: black; font-weight: bold; padding: 0 15px; border-radius: 8px; border: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div id="status">● DISCONNECTED</div>
        <button class="conn-btn" onclick="connect()">CONNECT BLE</button>
    </div>

    <div id="gauge-box">
        <canvas id="gauge-rpm"></canvas>
        <div id="target-num">0000</div>
    </div>

    <div class="section">
        <div class="label">Source Address</div>
        <div class="row">
            <select id="sa-list" onchange="document.getElementById('sa-val').value = this.value">
                <option value="229">Default (0xE5)</option>
                <option value="232">Caterpillar (0xE8)</option>
                <option value="247">Cummins (0xF7)</option>
                <option value="0">Engine #1 (0x00)</option>
                <option value="33">Body Control (0x21)</option>
            </select>
            <input id="sa-val" type="number" value="229">
            <button class="set-btn" onclick="setSA()">SET</button>
        </div>
    </div>

    <div class="section">
        <div class="label">CAN Baud Rate</div>
        <div class="row">
            <button id="b250" class="btn baud active" onclick="sendBaud(250)">250K</button>
            <button id="b500" class="btn baud" onclick="sendBaud(500)">500K</button>
        </div>
    </div>

    <div class="section">
        <div class="label">Control</div>
        <div class="row">
            <button class="btn resume" onclick="send(1000)">RESUME</button>
            <button class="btn stop" onclick="send(600)">STOP</button>
        </div>
        <div class="row">
            <button class="btn up" onclick="send(1)">UP</button>
            <button class="btn down" onclick="send(2)">DOWN</button>
        </div>
    </div>
</div>

<script>
    const gauge = new RadialGauge({
        renderTo: 'gauge-rpm', width: 370, height: 370, minValue: 0, maxValue: 3000,
        majorTicks: ["0","500","1000","1500","2000","2500","3000"],
        colorPlate: "#0a0a0a", colorNumbers: "#fff", needleType: "arrow",
        needleWidth: 3, needleColor: "#fff",
        // 반투명 아크 효과 적용
        barWidth: 12, colorBar: "rgba(255,255,255,0.05)", colorBarProgress: "rgba(0, 255, 157, 0.4)",
        valueBox: false, animationDuration: 150, animationRule: "linear"
    }).draw();

    let bleChar;
    async function connect() {
        const dev = await navigator.bluetooth.requestDevice({ filters: [{ services: ["4fafc201-1fb5-459e-8fcc-c5c9c331914b"] }] });
        const server = await dev.gatt.connect();
        const service = await server.getPrimaryService("4fafc201-1fb5-459e-8fcc-c5c9c331914b");
        bleChar = await service.getCharacteristic("beb5483e-36e1-4688-b7f5-ea07361b26a8");
        await bleChar.startNotifications();
        bleChar.addEventListener('characteristicvaluechanged', (e) => {
            const v = e.target.value;
            const cur = v.getUint16(0, true);
            const tar = v.getUint16(2, true);
            const is500 = v.getUint8(4) === 1;
            
            gauge.value = cur; // 바늘 -> Current
            gauge.update({ barProgress: tar }); // 아크 -> Target
            document.getElementById('target-num').innerText = tar; // 숫자 -> Target
            
            document.getElementById('status').innerText = "● CONNECTED";
            document.getElementById('status').style.color = "#00ff9d";
            document.getElementById('b500').className = is500 ? "btn baud active" : "btn baud";
            document.getElementById('b250').className = is500 ? "btn baud" : "btn baud active";
        });
    }

    async function send(v) { if(bleChar) await bleChar.writeValue(new Uint16Array([v])); }
    function sendBaud(k) { send(k === 500 ? 0x5000 : 0x2500); }
    function setSA() { const sa = parseInt(document.getElementById('sa-val').value); send(0xA500 | sa); }
</script>
</body>
</html>
