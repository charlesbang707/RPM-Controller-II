<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>J1939 MASTER</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { background: #111; color: #eee; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { max-width: 400px; margin: auto; background: #222; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        .row { display: flex; gap: 10px; margin-bottom: 15px; }
        .col { flex: 1; }
        select { width: 100%; padding: 10px; background: #333; color: white; border-radius: 8px; border: none; }
        .status { padding: 10px; margin-bottom: 20px; border-radius: 10px; background: #333; font-weight: bold; color: #ff4b2b; }
        .status.on { color: #00ff88; border: 1px solid #00ff88; }
        button { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; }
        .btn-blue { background: #007aff; }
        .btn-green { background: #28a745; }
        .btn-red { background: #dc3545; }
        .btn-gray { background: #555; }
    </style>
</head>
<body>
    <div class="card">
        <h3>J1939 MASTER CONTROL</h3>
        <div id="st" class="status">DISCONNECTED</div>
        <div class="row">
            <div class="col"><small>SOURCE ADDR</small>
                <select id="sa" onchange="sendCmd(0xA2, this.value)">
                    <option value="11">0x0B (Default)</option>
                    <option value="128">0x80 (Sim)</option>
                    <option value="44">0x2C (Alt)</option>
                </select>
            </div>
            <div class="col"><small>BAUDRATE</small>
                <select id="bd" onchange="if(confirm('Reboot?')) sendCmd(0xA1, this.value)">
                    <option value="500">500k</option>
                    <option value="250">250k</option>
                </select>
            </div>
        </div>
        <button id="cb" class="btn-blue" onclick="conn()">CONNECT DEVICE</button>
        <canvas id="gg"></canvas>
        <div class="row">
            <div class="col"><h2 id="cr" style="color:#00ff88; margin:0;">0</h2><small>CURRENT</small></div>
            <div class="col"><h2 id="tr" style="color:#ffcc00; margin:0;">1000</h2><small>TARGET</small></div>
        </div>
        <div class="row"><button class="btn-green" onclick="sendCmd(0xA3, 1)">START</button><button class="btn-red" onclick="sendCmd(0xA3, 0)">STOP</button></div>
        <div class="row"><button class="btn-gray" onclick="sendCmd(0xA4, 1)">RPM UP</button><button class="btn-gray" onclick="sendCmd(0xA4, 0)">RPM DOWN</button></div>
    </div>
    <script>
        let ch;
        const g = new RadialGauge({
            renderTo: 'gg', width: 300, height: 300, units: "RPM", minValue: 0, maxValue: 3000,
            majorTicks: ["0","500","1000","1500","2000","2500","3000"],
            colorPlate: "#222", colorNumbers: "#eee", colorMajorTicks: "#888", colorNeedle: "#ff3b30"
        }).draw();
        async function conn() {
            try {
                const d = await navigator.bluetooth.requestDevice({ filters: [{ services: ["6e400001-b5a3-f393-e0a9-e50e24dcca9e"] }] });
                const s = await d.gatt.connect();
                const sv = await s.getPrimaryService("6e400001-b5a3-f393-e0a9-e50e24dcca9e");
                ch = await sv.getCharacteristic("6e400002-b5a3-f393-e0a9-e50e24dcca9e");
                await ch.startNotifications();
                ch.addEventListener('characteristicvaluechanged', (e) => {
                    const v = e.target.value;
                    const cur = v.getUint8(0) | (v.getUint8(1) << 8);
                    const tar = v.getUint8(2) | (v.getUint8(3) << 8);
                    g.value = cur; document.getElementById('cr').innerText = cur; document.getElementById('tr').innerText = tar;
                });
                document.getElementById('st').innerText = "CONNECTED";
                document.getElementById('st').className = "status on";
                document.getElementById('cb').style.display = "none";
            } catch (e) { alert(e); }
        }
        async function sendCmd(t, v) { if(ch) await ch.writeValue(new Uint8Array([t, parseInt(v)])); }
    </script>
</body>
</html>
