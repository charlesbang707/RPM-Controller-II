<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J1939 RPM Master</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .box { max-width: 400px; margin: auto; background: #262626; padding: 20px; border-radius: 25px; border: 1px solid #444; }
        .status { padding: 10px; margin-bottom: 15px; border-radius: 10px; font-weight: bold; background: #333; color: #ff4444; }
        .status.ok { color: #00ff88; border: 1px solid #00ff88; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        select { background: #444; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; }
        .v-box { background: #333; padding: 15px; border-radius: 15px; border: 1px solid #444; }
        .v-num { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; margin-top: 8px; }
        .b-conn { background: #007aff; }
        .b-start { background: #28a745; }
        .b-stop { background: #dc3545; }
        .b-step { background: #555; }
    </style>
</head>
<body>
    <div class="box">
        <h3>J1939 PRO CONTROL</h3>
        <div id="st" class="status">NOT CONNECTED</div>
        <div class="row">
            <div><small>SOURCE ADDR</small>
                <select id="sa" onchange="send(0xA2, this.value)">
                    <option value="11">0x0B (Default)</option>
                    <option value="128">0x80 (Simulator)</option>
                </select>
            </div>
            <div><small>BAUDRATE</small>
                <select id="bd" onchange="if(confirm('Reboot?')) send(0xA1, this.value)">
                    <option value="500">500k</option>
                    <option value="250">250k</option>
                </select>
            </div>
        </div>
        <button id="cn" class="b-conn" onclick="conn()">CONNECT DEVICE</button>
        <canvas id="gg"></canvas>
        <div class="row">
            <div class="v-box"><div id="cur" class="v-num" style="color:#00ff88">0</div><small>CURRENT</small></div>
            <div class="v-box"><div id="tar" class="v-num" style="color:#ffcc00">1000</div><small>TARGET</small></div>
        </div>
        <div class="row"><button class="b-green" onclick="send(0xA3, 1)">START</button><button class="b-red" onclick="send(0xA3, 0)">STOP</button></div>
        <div class="row"><button class="b-step" onclick="send(0xA4, 1)">UP</button><button class="b-step" onclick="send(0xA4, 0)">DOWN</button></div>
    </div>
    <script>
        let ch;
        const g = new RadialGauge({
            renderTo: 'gg', width: 300, height: 300, units: "RPM", minValue: 0, maxValue: 3000,
            majorTicks: ["0","500","1000","1500","2000","2500","3000"],
            colorPlate: "#262626", colorNumbers: "#ccc", colorNeedle: "#ff3b30",
            highlights: [{ from: 0, to: 1000, color: "rgba(255, 204, 0, 0.3)" }], // 테두리 아크 초기값
            highlightsWidth: 10, barWidth: 10, borderShadowWidth: 0, valueBox: false
        }).draw();

        async function conn() {
            try {
                const d = await navigator.bluetooth.requestDevice({ filters: [{ services: ["6e400001-b5a3-f393-e0a9-e50e24dcca9e"] }] });
                const s = await d.gatt.connect();
                const sv = await s.getPrimaryService("6e400001-b5a3-f393-e0a9-e50e24dcca9e");
                ch = await sv.getCharacteristic("6e400002-b5a3-f393-e0a9-e50e24dcca9e");
                await ch.startNotifications();
                ch.addEventListener('characteristicvaluechanged', (e) => {
                    const v = e.target.value;
                    const c = v.getUint8(0) | (v.getUint8(1) << 8);
                    const t = v.getUint8(2) | (v.getUint8(3) << 8);
                    g.value = c;
                    // 타겟 RPM에 맞춰 바깥쪽 테두리 아크 업데이트
                    g.update({ highlights: [{ from: 0, to: t, color: "rgba(255, 204, 0, 0.4)" }] });
                    document.getElementById('cur').innerText = c;
                    document.getElementById('tar').innerText = t;
                });
                document.getElementById('st').innerText = "CONNECTED";
                document.getElementById('st').className = "status ok";
                document.getElementById('cn').style.display = "none";
            } catch (err) { alert(err); }
        }
        async function send(t, v) { if(ch) await ch.writeValue(new Uint8Array([t, parseInt(v)])); }
    </script>
</body>
</html>
